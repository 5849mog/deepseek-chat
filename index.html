<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DeepSeek Chat</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdfbf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DeepSeek">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- KaTeX (synchronous, zero-wait, works in file:// and all environments) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <!-- mhchem: chemical equations  \ce{H2O -> H+ + OH-} -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fdfbf7;
      --bg2:          #f5f2ec;
      --bg3:          #ebe6dd;
      --sidebar-bg:   #f4f0ea;
      --sidebar-hover:#e8e3db;
      --sidebar-act:  #dfd9ce;
      --border:       #e4dfd5;
      --border2:      #d1caba;
      --text:         #2d2926;
      --text2:        #5c5750;
      --text3:        #9e978e;
      --user-bg:      #eee9df;
      --user-border:  #e2dcd0;
      --accent:       #d97743;
      --accent2:      #b85c2b;
      --think-bg:     #f8f6f1;
      --think-border: #dcd6cb;
      --think-text:   #827b72;
      --code-bg:      #f4f1eb;
      --shadow-sm:    0 1px 2px rgba(0,0,0,.04);
      --shadow:       0 2px 6px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:    0 6px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
      --font:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', 'Fira Code', monospace;
      --header-h: 56px;
      --sidebar-w: 260px;
    }

    html, body { height:100%; width:100%; overflow:hidden;
      font-family:var(--font); background:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased; }

    #root-layout { display:flex; height:100dvh; width:100%; position:relative; }

    /* SIDEBAR */
    #sidebar {
      width:var(--sidebar-w); background:var(--sidebar-bg);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      flex-shrink:0; transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
      z-index:200;
    }
    .sidebar-header { padding:16px 16px 8px; flex-shrink:0; }
    .new-chat-btn {
      width:100%; display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border:1px solid var(--border); border-radius:10px;
      padding:10px 14px; font-family:var(--font); font-size:14px; font-weight:500;
      color:var(--text); cursor:pointer; transition:all 0.15s; box-shadow:var(--shadow-sm);
    }
    .new-chat-btn:hover { background:#fff; border-color:var(--border2); }
    .new-chat-btn svg { width:16px; height:16px; color:var(--text2); }

    #session-list {
      flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:2px;
    }
    #session-list::-webkit-scrollbar { width:4px; }
    #session-list::-webkit-scrollbar-thumb { background:transparent; border-radius:2px; }
    #session-list:hover::-webkit-scrollbar-thumb { background:var(--border2); }

    /* Session group headers */
    .session-group-label {
      font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.06em;
      text-transform:uppercase; padding:10px 12px 4px; user-select:none;
    }

    .session-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 12px; border-radius:8px; cursor:pointer; transition:background 0.12s;
      color:var(--text2); position:relative;
    }
    .session-item:hover { background:var(--sidebar-hover); color:var(--text); }
    .session-item.active { background:var(--sidebar-act); color:var(--text); font-weight:500; }
    .session-title { flex:1; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px; line-height:1.4; }
    .session-meta { font-size:11px; color:var(--text3); white-space:nowrap; }
    .session-item-inner { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }

    .delete-session-btn {
      width:22px; height:22px; display:flex; align-items:center; justify-content:center;
      border:none; background:transparent; color:var(--text3); border-radius:4px; cursor:pointer;
      opacity:0; transition:all 0.12s; flex-shrink:0;
    }
    .session-item:hover .delete-session-btn { opacity:1; }
    .delete-session-btn:hover { background:rgba(0,0,0,.08); color:#d93025; }

    .sidebar-footer {
      padding:12px 16px 16px; border-top:1px solid var(--border); flex-shrink:0;
      display:flex; flex-direction:column; gap:4px;
    }
    .tool-btn {
      display:flex; align-items:center; gap:10px; width:100%; background:transparent; border:none;
      padding:9px 12px; border-radius:8px; font-family:var(--font); font-size:13.5px; font-weight:500;
      color:var(--text2); cursor:pointer; transition:background 0.1s; text-align:left;
    }
    .tool-btn:hover { background:var(--sidebar-hover); color:var(--text); }
    .tool-btn svg { width:16px; height:16px; flex-shrink:0; }

    /* OVERLAY FOR MOBILE */
    #sidebar-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.25);
      backdrop-filter:blur(2px); z-index:199;
    }
    #sidebar-overlay.open { display:block; }

    /* APP */
    #app { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

    /* HEADER */
    #header {
      position:sticky; top:0; z-index:100; height:var(--header-h);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; background:rgba(253,251,247,0.9); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border); flex-shrink:0;
    }
    #header-left { display:flex; align-items:center; gap:10px; }

    .menu-toggle {
      display:none; width:34px; height:34px; border:none; background:transparent;
      border-radius:8px; color:var(--text2); cursor:pointer; align-items:center; justify-content:center;
    }
    .menu-toggle:hover { background:var(--bg2); }

    #logo {
      width:26px; height:26px; background:linear-gradient(135deg,#e38959,#c96b3a);
      border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    #logo svg { width:14px; height:14px; }

    /* Model dropdown */
    #model-selector-wrap { position:relative; }
    #model-btn {
      display:flex; align-items:center; gap:6px; padding:6px 10px 6px 12px;
      background:transparent; border:1px solid transparent; border-radius:20px;
      font-family:var(--font); font-size:14px; font-weight:600; color:var(--text);
      cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    #model-btn:hover { background:var(--bg2); border-color:var(--border); }
    #model-btn .chevron { transition:transform .2s; }
    #model-btn.open .chevron { transform:rotate(180deg); }

    #model-dropdown {
      display:none; position:absolute; top:calc(100% + 6px); left:0;
      min-width:230px; background:var(--bg); border:1px solid var(--border);
      border-radius:14px; box-shadow:var(--shadow-md); overflow:hidden; z-index:300;
      animation:dropIn .18s ease;
    }
    #model-dropdown.open { display:block; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-6px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .model-option {
      padding:12px 14px; cursor:pointer; display:flex; flex-direction:column; gap:2px;
      border-bottom:1px solid var(--border); transition:background .1s;
    }
    .model-option:last-child { border-bottom:none; }
    .model-option:hover,.model-option.selected { background:var(--bg2); }
    .model-option-name { font-size:13.5px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:6px; }
    .model-option-desc { font-size:11.5px; color:var(--text3); }
    .think-badge {
      font-size:9px; font-weight:600; letter-spacing:.04em; padding:1px 5px; border-radius:4px;
      background:linear-gradient(135deg,#9168e2,#6b44d4); color:#fff;
    }
    .checkmark { color:var(--accent); font-size:13px; margin-left:auto; }

    #header-right { display:flex; align-items:center; gap:8px; }

    /* MESSAGES */
    #messages-wrap {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain; display:flex; justify-content:center;
    }
    #messages-wrap::-webkit-scrollbar { width:4px; }
    #messages-wrap::-webkit-scrollbar-track { background:transparent; }
    #messages-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    #messages { width:100%; max-width:840px; padding:24px 16px 40px; display:flex; flex-direction:column; gap:24px; }

    .msg-row { display:flex; animation:fadeUp .26s ease; width:100%; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* user */
    .msg-row.user { justify-content:flex-end; }
    .msg-row.user .bubble {
      max-width:85%; background:var(--user-bg); border:1px solid var(--user-border);
      border-radius:20px 20px 4px 20px; padding:12px 16px; font-size:15px; line-height:1.65;
      color:var(--text); word-break:break-word; white-space:pre-wrap;
    }

    /* assistant */
    .msg-row.assistant { justify-content:flex-start; gap:14px; align-items:flex-start; }
    .assistant-avatar {
      width:30px; height:30px; flex-shrink:0; margin-top:2px;
      background:linear-gradient(135deg,#e38959,#c96b3a);
      border-radius:10px; display:flex; align-items:center; justify-content:center;
    }
    .assistant-avatar svg { width:16px; height:16px; }
    .assistant-content { flex:1; min-width:0; max-width:calc(100% - 44px); display:flex; flex-direction:column; gap:10px; }

    /* THINK BLOCK */
    .think-block { border:1px solid var(--think-border); border-radius:14px; background:var(--think-bg); overflow:hidden; }
    .think-header { display:flex; align-items:center; gap:8px; padding:10px 14px; cursor:pointer; user-select:none; }
    .think-spinner { width:14px; height:14px; flex-shrink:0; border:2px solid var(--think-border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .think-done-icon { width:14px; height:14px; flex-shrink:0; color:var(--text3); display:flex; }
    .think-done-icon svg { width:14px; height:14px; }
    .think-label { flex:1; font-size:13px; font-weight:500; color:var(--think-text); display:flex; align-items:center; gap:6px; }
    .think-dots span { display:inline-block; width:3px; height:3px; background:var(--think-text); border-radius:50%; animation:dotPulse 1.4s ease infinite; }
    .think-dots span:nth-child(2){animation-delay:.2s}
    .think-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }
    .think-chevron { color:var(--text3); transition:transform .22s ease; flex-shrink:0; }

    .think-body { overflow:hidden; max-height:0; transition:max-height .3s cubic-bezier(.4,0,.2,1), padding .22s; padding:0 14px; }
    .think-block.open .think-body { max-height:1400px; overflow-y:auto; padding:0 14px 14px; }
    .think-block.open .think-chevron { transform:rotate(180deg); }
    .think-body::-webkit-scrollbar { width:3px; }
    .think-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    .think-md { font-size:13.5px; line-height:1.65; color:var(--think-text); word-break:break-word; }
    .think-md p { margin-bottom:8px; }
    .think-md p:last-child { margin-bottom:0; }

    /* KaTeX display math */
    .katex-display { overflow-x: auto; overflow-y: hidden; margin: 14px 0; padding: 4px 0; }
    .katex-display > .katex { text-align: center; }
    .katex { font-size: 1.05em; }
    /* Scrollable display math wrapper */
    .math-display {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 6px 0; margin: 10px 0;
    }
    .math-display .katex-display { margin: 0; }
    /* Render error: show raw LaTeX in orange so it's obvious but not alarming */
    .katex-err {
      font-family: var(--mono); font-size: 13px; color: var(--accent2);
      background: #fff3ed; border: 1px dashed var(--accent);
      border-radius: 5px; padding: 2px 6px; cursor: help;
    }

    .md-content { font-size:15.5px; line-height:1.7; color:var(--text); word-break:break-word; }
    .md-content p { margin-bottom:14px; }
    .md-content p:last-child { margin-bottom:0; }
    .md-content h1,.md-content h2,.md-content h3,.md-content h4 { font-weight:600; margin:20px 0 10px; line-height:1.3; color:#111; }
    .md-content h1{font-size:20px} .md-content h2{font-size:18px} .md-content h3{font-size:16px}
    .md-content ul,.md-content ol { padding-left:24px; margin-bottom:14px; }
    .md-content li { margin-bottom:4px; }
    .md-content blockquote { border-left:3px solid var(--border2); padding:8px 14px; margin:12px 0; color:var(--text2); font-style:italic; background:var(--bg2); border-radius:0 8px 8px 0; }
    .md-content code:not(pre code) { font-family:var(--mono); font-size:13.5px; background:var(--code-bg); border:1px solid var(--border); border-radius:5px; padding:2px 6px; color:var(--accent2); }
    .md-content pre { background:var(--code-bg); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin:14px 0; }
    .code-header { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:var(--bg3); border-bottom:1px solid var(--border); }
    .code-lang { font-family:var(--mono); font-size:11.5px; font-weight:600; color:var(--text2); }
    .copy-btn { font-family:var(--font); font-size:11.5px; font-weight:600; color:var(--text3); background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; transition:all .15s; }
    .copy-btn:hover { background:var(--bg2); color:var(--text2); }
    .copy-btn.copied { color:var(--accent); }
    .md-content pre code { font-family:var(--mono); font-size:13px; display:block; padding:14px 16px; overflow-x:auto; background:none !important; line-height:1.6; }
    .md-content table { width:100%; border-collapse:collapse; font-size:14px; margin:14px 0; display:block; overflow-x:auto; }
    .md-content th,.md-content td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
    .md-content th { background:var(--bg2); font-weight:600; }
    .md-content a { color:var(--accent); text-decoration:underline; text-decoration-thickness:1px; }

    .cursor { display:inline-block; width:2px; height:1em; background:var(--text); vertical-align:text-bottom; animation:blink .9s step-start infinite; border-radius:1px; margin-left:2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* WELCOME */
    #welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px 40px; text-align:center; gap:16px; min-height:calc(100dvh - var(--header-h) - 120px); }
    #welcome-logo { width:64px; height:64px; background:linear-gradient(135deg,#e38959,#c96b3a); border-radius:18px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(201,107,58,.25); }
    #welcome-logo svg { width:32px; height:32px; }
    #welcome h1 { font-size:24px; font-weight:600; color:var(--text); margin-top:4px; }
    #welcome p { font-size:15px; color:var(--text3); line-height:1.6; max-width:300px; }
    .welcome-chips { display:flex; flex-direction:column; gap:10px; width:100%; max-width:380px; margin-top:12px; }
    .chip { padding:12px 18px; background:var(--bg2); border:1px solid var(--border); border-radius:14px; font-size:14px; color:var(--text2); cursor:pointer; text-align:left; transition:all .15s; font-family:var(--font); box-shadow:var(--shadow-sm); }
    .chip:hover { background:#fff; border-color:var(--border2); color:var(--text); transform:translateY(-1px); box-shadow:var(--shadow); }

    /* INPUT */
    #input-area { flex-shrink:0; padding:0 16px 16px; background:var(--bg); display:flex; justify-content:center; }
    #input-bar { width:100%; max-width:840px; display:flex; align-items:flex-end; gap:8px; background:#fff; border:1px solid var(--border); border-radius:20px; padding:8px 8px 8px 16px; transition:border-color .15s,box-shadow .15s; box-shadow:var(--shadow); }
    #input-bar:focus-within { border-color:var(--border2); box-shadow:0 0 0 3px rgba(201,107,58,.1),var(--shadow); }
    #textarea { flex:1; font-family:var(--font); font-size:15.5px; line-height:1.5; color:var(--text); background:transparent; border:none; outline:none; resize:none; min-height:24px; max-height:160px; padding:6px 0; overflow-y:auto; }
    #textarea::placeholder { color:var(--text3); }

    #send-btn { width:36px; height:36px; flex-shrink:0; border:none; background:var(--text); color:#fff; border-radius:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    #send-btn:hover:not(:disabled){background:#000;transform:scale(1.03)}
    #send-btn:active:not(:disabled){transform:scale(.97)}
    #send-btn:disabled { background:var(--bg3); cursor:not-allowed; }
    #send-btn.empty:not(:disabled) { background:var(--bg2); color:var(--text3); cursor:default; transform:none; }
    #send-btn svg { width:16px; height:16px; }

    #stop-btn { width:36px; height:36px; flex-shrink:0; border:1.5px solid var(--border2); background:transparent; color:var(--text2); border-radius:14px; cursor:pointer; display:none; align-items:center; justify-content:center; transition:all .15s; }
    #stop-btn.visible { display:flex; }
    #stop-btn:hover { background:var(--bg2); color:var(--text); }
    #stop-btn svg { width:14px; height:14px; }

    /* SETTINGS OVERLAY - fixed transition with visibility trick */
    #settings-overlay {
      visibility:hidden; opacity:0;
      position:fixed; inset:0; background:rgba(0,0,0,.3); backdrop-filter:blur(3px);
      z-index:400; transition:opacity .25s ease, visibility .25s ease;
      display:flex; align-items:flex-end; justify-content:center;
    }
    #settings-overlay.open { visibility:visible; opacity:1; }

    #settings-sheet {
      width:100%; max-width:520px; background:var(--bg); border-radius:20px 20px 0 0;
      padding:16px 20px 30px; transform:translateY(100%);
      transition:transform .32s cubic-bezier(0.34,1.2,0.64,1);
      display:flex; flex-direction:column; max-height:92dvh;
      box-shadow:0 -4px 20px rgba(0,0,0,.12);
    }
    #settings-overlay.open #settings-sheet { transform:translateY(0); }

    .sheet-handle { width:40px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 16px; }
    .sheet-title { font-size:18px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:var(--text); }

    .settings-scroll-area { overflow-y:auto; overflow-x:hidden; margin:0 -20px; padding:0 20px 20px; flex:1; }
    .settings-scroll-area::-webkit-scrollbar { width:4px; }
    .settings-scroll-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    .setting-card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:var(--shadow-sm); }
    .card-title { font-size:14.5px; font-weight:600; margin-bottom:14px; color:var(--text); display:flex; align-items:center; gap:6px; }
    .field-label { font-size:12px; font-weight:600; color:var(--text2); letter-spacing:.02em; margin-bottom:6px; display:block; }
    .field-input { width:100%; font-family:var(--mono); font-size:13.5px; padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); outline:none; transition:all .15s; margin-bottom:6px; }
    .field-input:focus { border-color:var(--border2); background:#fff; box-shadow:0 0 0 3px rgba(201,107,58,.08); }
    .field-hint { font-size:11.5px; color:var(--text3); line-height:1.5; margin-bottom:14px; }
    .field-hint:last-child { margin-bottom:0; }

    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:16px 0 6px; border-top:1px solid var(--border); margin-top:12px; }
    .toggle-info { flex:1; padding-right:16px; }
    .toggle-label { font-size:14px; font-weight:600; color:var(--text); }
    .toggle-desc { font-size:11.5px; color:var(--text3); margin-top:4px; line-height:1.4; }

    .switch { position:relative; display:inline-block; width:44px; height:24px; flex-shrink:0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:var(--border2); transition:.25s; border-radius:24px; }
    .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:.25s cubic-bezier(.4,0,.2,1); border-radius:50%; box-shadow:0 1px 2px rgba(0,0,0,.15); }
    input:checked + .slider { background-color:var(--accent); }
    input:checked + .slider:before { transform:translateX(20px); }

    #max-context-wrap { margin-top:12px; padding-top:14px; border-top:1px dashed var(--border); }
    #max-context-wrap.hidden { display:none; }

    /* Storage warning banner */
    #storage-warning {
      display:none; background:#fff3cd; border:1px solid #ffc107; border-radius:10px;
      padding:10px 14px; font-size:13px; color:#856404; margin-bottom:14px;
      align-items:center; gap:8px;
    }
    #storage-warning.visible { display:flex; }

    .save-btn { width:100%; padding:14px; background:var(--text); color:#fff; border:none; border-radius:14px; font-family:var(--font); font-size:15px; font-weight:600; cursor:pointer; transition:all .15s; margin-top:6px; flex-shrink:0; }
    .save-btn:hover { background:#000; transform:translateY(-1px); }
    .save-btn:active { transform:translateY(1px); }

    /* SCROLL DOWN */
    #scroll-down { position:fixed; bottom:90px; right:16px; width:36px; height:36px; background:var(--bg); border:1px solid var(--border2); border-radius:50%; box-shadow:var(--shadow-md); display:none; align-items:center; justify-content:center; cursor:pointer; z-index:50; color:var(--text2); transition:all .2s; }
    #scroll-down.visible { display:flex; }
    #scroll-down:hover { background:var(--bg2); }
    #scroll-down svg { width:16px; height:16px; }

    /* TOAST */
    #toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; font-size:13.5px; font-weight:500; padding:10px 20px; border-radius:24px; opacity:0; pointer-events:none; transition:all .3s cubic-bezier(0.2,0.8,0.2,1); z-index:500; white-space:nowrap; box-shadow:var(--shadow-md); }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Error message in chat */
    .error-msg { color:#d93025; font-size:14px; display:flex; align-items:center; gap:6px; padding:10px 0; }
    .error-msg svg { width:16px; height:16px; flex-shrink:0; }

    .hljs { background:transparent !important; padding:0 !important; }

    @media (max-width:768px) {
      .menu-toggle { display:flex; }
      #sidebar { position:fixed; height:100%; transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0); }
      #messages { padding:16px 16px 30px; }
      .msg-row.user .bubble { max-width:90%; }
      #input-area { padding-bottom:calc(16px + env(safe-area-inset-bottom)); }
      #scroll-down { bottom:calc(90px + env(safe-area-inset-bottom)); }

      /* Bigger touch targets on mobile */
      .delete-session-btn { opacity:1; width:28px; height:28px; }
      .session-item { padding:11px 12px; }
      .copy-btn { padding:5px 10px; }

      /* iOS tap highlight removal */
      button, a, .session-item, .chip { -webkit-tap-highlight-color:transparent; }

      /* Active state feedback for touch */
      .chip:active { transform:scale(.97); background:var(--bg3); }
      .new-chat-btn:active { background:var(--bg2); }
      .session-item:active { background:var(--sidebar-act); }
      .tool-btn:active { background:var(--sidebar-hover); }
      #send-btn:active:not(:disabled) { transform:scale(.93); }
      #stop-btn:active { background:var(--bg3); }
      .model-option:active { background:var(--bg3); }

      /* Improve think block max-height on mobile */
      .think-block.open .think-body { max-height:60dvh; }

      /* Slightly larger message font on mobile for readability */
      .md-content { font-size:15px; }
      .msg-row.user .bubble { font-size:15px; }
    }

    /* Flash animation for sidebar active item */
    @keyframes sessionFlash {
      0%   { background: var(--sidebar-act); }
      40%  { background: var(--accent); color: #fff; }
      100% { background: var(--sidebar-act); }
    }
    .session-item.flash { animation: sessionFlash 0.55s ease; }

    /* Slide-up animation for action sheet */
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    /* Prevent text selection during long press on messages (mobile) */
    .msg-row { -webkit-user-select:none; user-select:none; }
    .msg-row.user .bubble { -webkit-user-select:text; user-select:text; }
    .md-content { -webkit-user-select:text; user-select:text; }
    .think-md { -webkit-user-select:text; user-select:text; }
  </style>
</head>
<body>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const SESSIONS_KEY  = 'ds_sessions_v3';
const ACTIVE_ID_KEY = 'ds_active_session_id';
const CFG_KEY       = 'ds_cfg_v2';
const MAX_SESSIONS  = 200;        // hard cap on number of sessions
const MAX_HISTORY   = 500;        // hard cap on messages per session
const STORAGE_WARN_BYTES = 4 * 1024 * 1024; // warn at 4 MB

// ============================================================
//  APP STATE
// ============================================================
const state = {
  model: 'deepseek-chat',
  apiKey: '',
  baseUrl: 'https://api.deepseek.com',
  systemPrompt: '',
  enableSliding: true,
  maxContextSize: 20,
  sessions: [],
  currentSessionId: null,
  isStreaming: false,
  abortController: null,
  streamingSessionId: null,   // track which session is streaming
};

// ============================================================
//  STORAGE MANAGER  ← core fix for disappearing conversations
// ============================================================
const StorageManager = {
  /** Robustly save sessions. Returns true on success. */
  saveSessions() {
    try {
      const serialized = JSON.stringify(state.sessions);
      localStorage.setItem(SESSIONS_KEY, serialized);
      if (state.currentSessionId) {
        localStorage.setItem(ACTIVE_ID_KEY, state.currentSessionId);
      }
      return true;
    } catch (e) {
      if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
        // Emergency: trim oldest sessions and retry
        console.warn('[Storage] Quota exceeded, trimming…');
        this._emergencyTrim();
        try {
          localStorage.setItem(SESSIONS_KEY, JSON.stringify(state.sessions));
          showToast('⚠ 存储空间不足，已自动清理旧对话');
          return true;
        } catch (e2) {
          showToast('❌ 存储失败，请导出备份后清理对话');
          console.error('[Storage] Save failed even after trim:', e2);
          return false;
        }
      }
      console.error('[Storage] Unexpected save error:', e);
      return false;
    }
  },

  /** Load and VALIDATE sessions from localStorage. */
  loadSessions() {
    try {
      const raw = localStorage.getItem(SESSIONS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .filter(s => s && typeof s.id === 'string' && Array.isArray(s.history))
        .map(s => ({
          id: s.id,
          title: typeof s.title === 'string' && s.title.trim() ? s.title.trim() : '新对话',
          model: typeof s.model === 'string' ? s.model : 'deepseek-chat',
          history: s.history
            .filter(m => m && (m.role === 'user' || m.role === 'assistant'))
            .map(m => ({
              role: m.role,
              content: typeof m.content === 'string' ? m.content : '',
              reasoning: typeof m.reasoning === 'string' ? m.reasoning : '',
            }))
            .slice(-MAX_HISTORY),
          updatedAt: typeof s.updatedAt === 'number' ? s.updatedAt : Date.now(),
          createdAt: typeof s.createdAt === 'number' ? s.createdAt : Date.now(),
        }))
        .slice(0, MAX_SESSIONS);
    } catch (e) {
      console.error('[Storage] Load/parse failed, resetting:', e);
      return [];
    }
  },

  loadConfig() {
    try {
      return JSON.parse(localStorage.getItem(CFG_KEY) || '{}');
    } catch { return {}; }
  },

  saveConfig(cfg) {
    try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch {}
  },

  getActiveId() {
    return localStorage.getItem(ACTIVE_ID_KEY) || null;
  },

  /** Estimate current usage in bytes */
  getUsageBytes() {
    try {
      let total = 0;
      for (const k of [SESSIONS_KEY, CFG_KEY, ACTIVE_ID_KEY]) {
        const v = localStorage.getItem(k);
        if (v) total += v.length * 2; // UTF-16
      }
      return total;
    } catch { return 0; }
  },

  _emergencyTrim() {
    // Remove sessions beyond 30, trimming from oldest first
    state.sessions.sort((a, b) => b.updatedAt - a.updatedAt);
    state.sessions.splice(30); // keep newest 30
    // Also trim each session's history
    state.sessions.forEach(s => {
      if (s.history.length > 40) s.history = s.history.slice(-40);
    });
  },

  /** Migrate old format if present */
  migrate() {
    // v2 → v3 key rename
    const old = localStorage.getItem('ds_sessions_v2');
    if (old && !localStorage.getItem(SESSIONS_KEY)) {
      localStorage.setItem(SESSIONS_KEY, old);
    }
    // legacy single-session format
    const oldSession = localStorage.getItem('ds_chat_session');
    if (oldSession && !localStorage.getItem(SESSIONS_KEY)) {
      try {
        const s = JSON.parse(oldSession);
        const history = Array.isArray(s.history) ? s.history : [];
        const sessions = [{
          id: genId(), title: history[0]?.content?.slice(0,15) || '新对话',
          model: s.model || 'deepseek-chat', history,
          updatedAt: Date.now(), createdAt: Date.now(),
        }];
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
        localStorage.removeItem('ds_chat_session');
      } catch {}
    }
  },
};

// ============================================================
//  UTILITIES
// ============================================================
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatRelativeDate(ts) {
  const now = Date.now();
  const diff = now - ts;
  const day = 86400000;
  if (diff < day) return '今天';
  if (diff < 2 * day) return '昨天';
  if (diff < 7 * day) return '本周';
  if (diff < 30 * day) return '本月';
  const d = new Date(ts);
  return `${d.getFullYear()}年${d.getMonth()+1}月`;
}

// ============================================================
//  MARKDOWN + MATH RENDERER  (KaTeX — synchronous, no async wait)
// ============================================================

const KATEX_OPTS_DISPLAY = {

    '\\bm': '\\boldsymbol',
    // ── Calculus / Analysis ──────────────────────────────────────────────
    // Differential d (upright)
    '\\d': '\\mathop{}\\!\\mathrm{d}',
    // Derivatives  \dv{f}{x}  \dv[n]{f}{x}
    '\\dv': '{\\frac{\\mathrm{d}#1}{\\mathrm{d}#2}}',
    '\\dvn': '{\\frac{\\mathrm{d}^{#1}#2}{\\mathrm{d}#3^{#1}}}',
    // Partial derivatives  \pdv{f}{x}  \pdv[n]{f}{x}
    '\\pdv': '{\\frac{\\partial #1}{\\partial #2}}',
    '\\pdvn': '{\\frac{\\partial^{#1} #2}{\\partial #3^{#1}}}',
    // Integral shortcuts
    '\\intd': '\\int\\!\\mathrm{d}',
    // ── Vector calculus ──────────────────────────────────────────────────
    '\\grad': '\\nabla',
    '\\curl': '\\nabla\\times',
    '\\div':  '\\nabla\\cdot',
    '\\lapl': '\\nabla^2',
    // Vectors
    '\\vb':  '\\boldsymbol{#1}',
    '\\vu':  '\\hat{\\boldsymbol{#1}}',
    '\\va':  '\\vec{#1}',
    // ── Dirac notation (quantum mechanics) ───────────────────────────────
    '\\ket':    '{\\left|{#1}\\right\\rangle}',
    '\\bra':    '{\\left\\langle{#1}\\right|}',
    '\\braket': '{\\left\\langle{#1}\\middle|{#2}\\right\\rangle}',
    '\\ketbra': '{\\left|{#1}\\right\\rangle\\!\\left\\langle{#2}\\right|}',
    '\\expval': '{\\left\\langle{#1}\\right\\rangle}',
    '\\mel':    '{\\left\\langle{#1}\\middle|{#2}\\middle|{#3}\\right\\rangle}',
    // ── Linear algebra ───────────────────────────────────────────────────
    '\\tr':   '\\operatorname{tr}',
    '\\Tr':   '\\operatorname{Tr}',
    '\\rank': '\\operatorname{rank}',
    '\\diag': '\\operatorname{diag}',
    '\\adj':  '\\operatorname{adj}',
    '\\eig':  '\\operatorname{eig}',
    // ── Analysis / Topology ──────────────────────────────────────────────
    '\\cl':   '\\overline{#1}',
    '\\intr': '\\operatorname{int}',
    '\\supp': '\\operatorname{supp}',
    '\\sgn':  '\\operatorname{sgn}',
    '\\dist': '\\operatorname{dist}',
    '\\Res':  '\\operatorname{Res}',
    '\\pv':   '\\operatorname{P.V.}',
    // ── Probability / Statistics ─────────────────────────────────────────
    '\\E':    '\\mathbb{E}',
    '\\Var':  '\\operatorname{Var}',
    '\\Cov':  '\\operatorname{Cov}',
    '\\Prob': '\\mathbb{P}',
    '\\ind':  '\\mathbf{1}',
    '\\iid':  '\\overset{\\text{i.i.d.}}{\\sim}',
    // ── Thermodynamics / Chemistry ───────────────────────────────────────
    '\\enthalpy':  '\\Delta H',
    '\\entropy':   '\\Delta S',
    '\\gibbs':     '\\Delta G',
    // ── Common physics symbols ───────────────────────────────────────────
    '\\hbar': '\\hbar',

const KATEX_OPTS_INLINE = { ...KATEX_OPTS_DISPLAY, displayMode: false };

function katexRender(src, display) {
  try {
    return katex.renderToString(src, display ? KATEX_OPTS_DISPLAY : KATEX_OPTS_INLINE);
  } catch(e) {
    // Fallback: show raw LaTeX in a styled span so user can see what failed
    const delim = display ? ['\\[', '\\]'] : ['\\(', '\\)'];
    return `<span class="katex-err" title="${esc(String(e))}">${esc(delim[0] + src + delim[1])}</span>`;
  }
}

function renderMarkdown(text) {
  if (!text || typeof text !== 'string') return '';

  const saved = [];   // { type:'code'|'display'|'inline', rendered:string }

  const protect = (rendered) => {
    saved.push(rendered);
    return `\x02${saved.length - 1}\x03`;
  };

  let s = text;

  // 0. Escaped dollar → sentinel
  s = s.replace(/\\\$/g, '\x02ESCD\x03');

  // 1. Fenced code blocks & inline code  (highest priority — protect fully)
  s = s.replace(/(`{3,})([\s\S]*?)\1|(`[^`\n]+`)/g, m => protect(m));

  // 2. Display math: $$...$$
  s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, inner) =>
    protect(`<div class="math-display">${katexRender(inner.trim(), true)}</div>`)
  );

  // 3. Display math: \[...\]
  s = s.replace(/\\\[([\s\S]+?)\\\]/g, (_, inner) =>
    protect(`<div class="math-display">${katexRender(inner.trim(), true)}</div>`)
  );

  // 4. LaTeX environments: \begin{env}...\end{env}
  //    (align, equation*, matrix, pmatrix, cases, gather, etc.)
  s = s.replace(/\\begin\{([a-zA-Z*]+)\}([\s\S]*?)\\end\{\1\}/g, fullMatch =>
    protect(`<div class="math-display">${katexRender(fullMatch.trim(), true)}</div>`)
  );

  // 5. Inline math: \(...\)
  s = s.replace(/\\\(([\s\S]+?)\\\)/g, (_, inner) =>
    protect(katexRender(inner.trim(), false))
  );

  // 6. Inline math: $...$ (non-greedy, avoid $$, require non-space at edges)
  s = s.replace(/(?<!\$)\$([^\s$\n][^$\n]*?[^\s$\n]|[^\s$\n])\$(?!\$)/g, (_, inner) =>
    protect(katexRender(inner.trim(), false))
  );

  // 7. Restore code blocks so marked can highlight them
  s = s.replace(/\x02(\d+)\x03/g, (_, i) => saved[+i]);
  s = s.replace(/\x02ESCD\x03/g, '$');

  // 8. Run marked
  let html = marked.parse(s);

  // 9. Restore all rendered math + code (they were already converted to HTML)
  //    marked may have wrapped them in <p>; restore inline without a block wrapper
  html = html.replace(/\x02(\d+)\x03/g, (_, i) => saved[+i] ?? '');

  // 10. Clean up empty <p></p> around display math blocks
  html = html.replace(/<p>\s*(<div class="math-display">[\s\S]*?<\/div>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

// ============================================================
//  ROBUST COPY  (file://, http://, https:// all supported)
// ============================================================
async function copyTextRobust(text) {
  // Tier 1: Modern Clipboard API (https + focused)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch { /* fall through */ }
  }
  // Tier 2: execCommand (file:// and old browsers)
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length); // iOS
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) return true;
  } catch { /* fall through */ }
  // Tier 3: Show a selectable modal so user can manually copy
  showCopyFallbackModal(text);
  return false;
}

// Minimal copy-fallback modal for iOS file:// edge cases

      <textarea readonly style="width:100%;height:140px;font-size:13px;font-family:var(--mono);border:1px solid #e4dfd5;border-radius:10px;padding:10px;resize:none;color:#2d2926;background:#f5f2ec;outline:none;">${esc(text)}</textarea>
      <button onclick="document.getElementById('copy-modal').remove()" style="margin-top:12px;width:100%;padding:12px;background:#2d2926;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">关闭</button>
    </div>`;
  // Auto-select text
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  });
}

function triggerHaptic(type = 'light') {
  if (!navigator.vibrate) return;
  const patterns = { light: 8, medium: 18, heavy: 35, success: [8, 50, 8] };
  navigator.vibrate(patterns[type] || 10);
}

(function setupLongPress() {
  let timer = null, target = null;
  const DELAY = 520;

  function getTextFromRow(el) {

      showMsgActions(target, text.trim());
      timer = null;

  }, { passive: true });

  ['touchend','touchcancel','touchmove'].forEach(evt => {
    document.getElementById('messages').addEventListener(evt, () => {
      if (timer) { clearTimeout(timer); timer = null; }
    }, { passive: true });
  });
})();

// ============================================================
//  SESSION MANAGEMENT
// ============================================================
function getSessionById(id) {
  return state.sessions.find(s => s.id === id) || null;
}

function createNewSession(switchNow = true) {
  // ── Guard: already on a pristine empty session ──────────────────────────
  if (switchNow) {
    const cur = getSessionById(state.currentSessionId);
    if (cur && cur.history.length === 0) {
      // Already on a blank new chat — just highlight & focus
      showToast('已在新对话，直接开始输入吧 ✨');
      const ta = document.getElementById('textarea');
      ta.focus();
      // Briefly flash the active item in sidebar for visual feedback
      const activeItem = document.querySelector('.session-item.active');
      if (activeItem) {
        activeItem.classList.add('flash');
        setTimeout(() => activeItem.classList.remove('flash'), 600);
      }
      if (window.innerWidth <= 768) toggleSidebar(false);
      return;
    }
  }
  // ── Normal: create fresh session ────────────────────────────────────────
  if (state.isStreaming) stopStream();
  const newId = genId();
  const newSession = {
    id: newId,
    title: '新对话',
    model: state.model,
    history: [],
    updatedAt: Date.now(),
    createdAt: Date.now(),
  };
  state.sessions.unshift(newSession);
  StorageManager.saveSessions();
  if (switchNow) switchSession(newId);
  else renderSessionList();
}

function switchSession(id) {
  if (state.isStreaming && state.streamingSessionId !== id) stopStream();
  const session = getSessionById(id);
  if (!session) {
    // Session not found — fallback to first available
    if (state.sessions.length > 0) switchSession(state.sessions[0].id);
    else createNewSession(true);
    return;
  }
  state.currentSessionId = id;

  // Restore the model for this session
  const modelEl = document.querySelector(`.model-option[data-model="${session.model}"]`);
  if (modelEl) selectModel(modelEl, false);

  // Render messages
  const msgContainer = document.getElementById('messages');
  msgContainer.innerHTML = '';

  if (session.history.length === 0) {
    renderWelcome();
  } else {
    // Render validated history
    session.history.forEach(m => {
      if (m.role === 'user') {
        buildUserRow(m.content);
      } else if (m.role === 'assistant') {
        buildAssistantRow(m.content, m.reasoning || '', true);
      }
    });
    requestAnimationFrame(() => {
      requestAnimationFrame(() => scrollToBottom(false));
    });
  }

  StorageManager.saveSessions();
  renderSessionList();
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function deleteSession(e, id) {
  e.stopPropagation();
  if (state.isStreaming && state.streamingSessionId === id) stopStream();
  state.sessions = state.sessions.filter(s => s.id !== id);
  if (state.sessions.length === 0) {
    createNewSession(true);
  } else if (state.currentSessionId === id) {
    switchSession(state.sessions[0].id);
  } else {
    StorageManager.saveSessions();
    renderSessionList();
  }
}

function updateSessionTitleIfNew(text) {
  const session = getSessionById(state.currentSessionId);
  if (session && session.history.length === 1 && session.title === '新对话') {
    session.title = text.slice(0, 20) + (text.length > 20 ? '…' : '');
    renderSessionList();
  }
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';

  // Sort by updated time (newest first) and group
  const sorted = [...state.sessions].sort((a, b) => b.updatedAt - a.updatedAt);
  let lastGroup = null;

  sorted.forEach(s => {
    const group = formatRelativeDate(s.updatedAt);
    if (group !== lastGroup) {
      const label = document.createElement('div');
      label.className = 'session-group-label';
      label.textContent = group;
      list.appendChild(label);
      lastGroup = group;
    }

    const el = document.createElement('div');
    el.className = `session-item ${s.id === state.currentSessionId ? 'active' : ''}`;
    el.onclick = () => switchSession(s.id);

    const inner = document.createElement('div');
    inner.className = 'session-item-inner';
    const titleEl = document.createElement('div');
    titleEl.className = 'session-title';
    titleEl.textContent = s.title;
    inner.appendChild(titleEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-session-btn';
    delBtn.title = '删除';
    delBtn.onclick = (e) => deleteSession(e, s.id);
    delBtn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`;

    el.append(inner, delBtn);
    list.appendChild(el);
  });
}

// ============================================================
//  SEND MESSAGE + STREAMING
// ============================================================
async function sendMessage() {
  if (state.isStreaming) return;
  const ta = document.getElementById('textarea');
  const text = ta.value.trim();
  if (!text) return;

  if (!state.apiKey) {
    openSettings();
    showToast('请先设置 API Key');
    return;
  }

  const session = getSessionById(state.currentSessionId);
  if (!session) { showToast('无效的对话，请新建对话'); return; }

  ta.value = '';
  handleInput();
  triggerHaptic('light');
  const messagesToSend = [];
  if (state.systemPrompt) messagesToSend.push({ role: 'system', content: state.systemPrompt });

  let historyToSend = session.history;
  if (state.enableSliding && state.maxContextSize > 0) {
    historyToSend = session.history.slice(-state.maxContextSize);
  }
  historyToSend.forEach(m => messagesToSend.push({ role: m.role, content: m.content }));
  messagesToSend.push({ role: 'user', content: text });

  // Add user message to state immediately
  session.history.push({ role: 'user', content: text, reasoning: '' });
  session.updatedAt = Date.now();
  updateSessionTitleIfNew(text);
  StorageManager.saveSessions();

  buildUserRow(text);
  const refs = buildAssistantRow('', '', false);
  setUI(true);
  // Re-focus for quick follow-up (desktop); on mobile keyboard stays up naturally
  if (window.innerWidth > 768) document.getElementById('textarea').focus();
  await stream(refs, messagesToSend, session);
  setUI(false);
}

function setUI(streaming) {
  state.isStreaming = streaming;
  const btn = document.getElementById('send-btn');
  btn.disabled = streaming;
  btn.classList.toggle('empty', streaming || !document.getElementById('textarea').value.trim());
  document.getElementById('stop-btn').classList.toggle('visible', streaming);
}

function stopStream() {
  state.abortController?.abort();
}

async function stream({ mdEl, thinkRefs, row }, messagesToSend, session) {
  state.abortController = new AbortController();
  state.streamingSessionId = session.id;

  let thinking = '', answer = '', thinkDone = false;
  const t0 = Date.now();
  let renderTimer = null, lastRenderTime = 0;

  const updateDOM = () => {
    // Guard: check session still exists (might have been deleted)
    if (!getSessionById(session.id)) return;

    if (thinking && thinkRefs) {
      thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
      scheduleTypeset(thinkRefs.mdDiv);
      if (thinkRefs.block.classList.contains('open') && !isUserScrolledUp) {
        thinkRefs.body.scrollTop = thinkRefs.body.scrollHeight;
      }
    }
    if (answer) {
      mdEl.innerHTML = renderMarkdown(answer) + '<span class="cursor"></span>';
      scheduleTypeset(mdEl);
    }
    scrollToBottom(false);
  };

  const scheduleRender = () => {
    const now = Date.now();
    if (now - lastRenderTime > 80) {
      updateDOM();
      lastRenderTime = now;
    } else if (!renderTimer) {
      renderTimer = setTimeout(() => {
        updateDOM();
        lastRenderTime = Date.now();
        renderTimer = null;
      }, 80);
    }
  };

  try {
    const res = await fetch(`${state.baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.apiKey}`,
      },
      body: JSON.stringify({
        model: state.model,
        messages: messagesToSend,
        stream: true,
        max_tokens: 8192,
      }),
      signal: state.abortController.signal,
    });

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try { const errJson = await res.json(); errMsg = errJson.error?.message || errMsg; } catch {}
      throw new Error(errMsg);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line in buffer
      for (const line of lines) {
        const t = line.trim();
        if (!t || t === 'data: [DONE]') continue;
        if (!t.startsWith('data: ')) continue;
        let json;
        try { json = JSON.parse(t.slice(6)); } catch { continue; }
        const delta = json.choices?.[0]?.delta;
        if (!delta) continue;
        if (delta.reasoning_content && thinkRefs) {
          thinking += delta.reasoning_content;
          scheduleRender();
        }
        if (delta.content) {
          if (!thinkDone && thinkRefs) {
            thinkDone = true;
            const secs = Math.round((Date.now() - t0) / 1000);
            thinkRefs.spinner.className = 'think-done-icon';
            thinkRefs.spinner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            thinkRefs.labelEl.textContent = `已思考 ${secs} 秒`;
            thinkRefs.block.classList.remove('open');
            thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
            typesetElement(thinkRefs.mdDiv);
          }
          answer += delta.content;
          scheduleRender();
        }
      }
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      // User stopped — partial content is fine, handled in finally
    } else {
      renderErrorInRow(mdEl, `请求失败：${err.message}`);
      showToast('请求失败，请检查网络和 API Key');
      // Roll back the user message we added
      const lastIdx = session.history.length - 1;
      if (session.history[lastIdx]?.role === 'user') {
        session.history.pop();
        StorageManager.saveSessions();
      }
      return; // skip saving assistant message
    }
  } finally {
    if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }

    // Final render — remove cursor, set complete HTML (KaTeX already rendered inline)
    if (answer) {
      mdEl.innerHTML = renderMarkdown(answer);
    }
    mdEl.querySelector('.cursor')?.remove();

    // Fix think block state on abort/no-answer
    if (thinkRefs && !thinkDone) {
      thinkRefs.spinner.className = 'think-done-icon';
      thinkRefs.spinner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      thinkRefs.labelEl.textContent = thinking ? '思考已中止' : '思考中断';
      if (thinking) thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
    }

    // Save assistant message if there's content
    if ((answer || thinking) && getSessionById(session.id)) {
      session.history.push({ role: 'assistant', content: answer, reasoning: thinking });
      session.updatedAt = Date.now();
      StorageManager.saveSessions();
      renderSessionList();
    }

    state.abortController = null;
    state.streamingSessionId = null;
    scrollToBottom(true);
  }
}

// ============================================================
//  SETTINGS
// ============================================================
function openSettings() {
  document.getElementById('api-key-input').value = state.apiKey;
  document.getElementById('base-url-input').value =
    state.baseUrl === 'https://api.deepseek.com' ? '' : state.baseUrl;
  document.getElementById('system-prompt-input').value = state.systemPrompt;
  document.getElementById('sliding-context-input').checked = state.enableSliding;
  document.getElementById('max-context-input').value = state.maxContextSize;
  toggleContextSizeUI();

  // Show storage info
  updateStorageInfo();

  document.getElementById('settings-overlay').classList.add('open');
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target.id === 'settings-overlay') closeSettings();
}

function toggleContextSizeUI() {
  const enabled = document.getElementById('sliding-context-input').checked;
  document.getElementById('max-context-wrap').classList.toggle('hidden', !enabled);
}

function saveSettings() {
  state.apiKey = document.getElementById('api-key-input').value.trim();
  const bu = document.getElementById('base-url-input').value.trim();
  state.baseUrl = bu || 'https://api.deepseek.com';
  state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
  state.enableSliding = document.getElementById('sliding-context-input').checked;
  state.maxContextSize = parseInt(document.getElementById('max-context-input').value, 10) || 20;
  StorageManager.saveConfig({
    apiKey: state.apiKey, baseUrl: state.baseUrl,
    systemPrompt: state.systemPrompt, enableSliding: state.enableSliding,
    maxContextSize: state.maxContextSize,
  });
  closeSettings();
  showToast('✓ 设置已保存');
}

function updateStorageInfo() {
  const bytes = StorageManager.getUsageBytes();
  const kb = (bytes / 1024).toFixed(1);
  const pct = Math.min(100, (bytes / (5 * 1024 * 1024)) * 100).toFixed(0);
  document.getElementById('storage-info-text').innerHTML =
    `已使用约 <strong>${kb} KB</strong>，共 <strong>${state.sessions.length}</strong> 个对话，约占本地存储上限的 <strong>${pct}%</strong>。`;
  document.getElementById('storage-warning').classList.toggle('visible', bytes >= STORAGE_WARN_BYTES);
}

function trimOldSessions() {
  const thirtyDaysAgo = Date.now() - 30 * 86400000;
  const before = state.sessions.length;
  state.sessions = state.sessions.filter(s =>
    s.id === state.currentSessionId || s.updatedAt > thirtyDaysAgo
  );
  const removed = before - state.sessions.length;
  StorageManager.saveSessions();
  renderSessionList();
  updateStorageInfo();
  showToast(removed > 0 ? `✓ 已清理 ${removed} 个旧对话` : '没有超过30天的旧对话');
}

// ============================================================
//  MODEL SELECTOR
// ============================================================
function toggleModelDropdown() {
  const open = document.getElementById('model-dropdown').classList.toggle('open');
  document.getElementById('model-btn').classList.toggle('open', open);
  if (open) setTimeout(() => document.addEventListener('click', outsideModelClose, true), 0);
}

function outsideModelClose(e) {
  if (!document.getElementById('model-selector-wrap').contains(e.target)) {
    document.getElementById('model-dropdown').classList.remove('open');
    document.getElementById('model-btn').classList.remove('open');
    document.removeEventListener('click', outsideModelClose, true);
  }
}

function selectModel(el, save = true) {
  if (!el) return;
  state.model = el.dataset.model;
  document.querySelectorAll('.model-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('check-deepseek-chat').style.display = 'none';
  document.getElementById('check-deepseek-reasoner').style.display = 'none';
  const checkEl = document.getElementById('check-' + state.model);
  if (checkEl) checkEl.style.display = 'inline';
  const labels = { 'deepseek-chat': 'DeepSeek V3', 'deepseek-reasoner': 'DeepSeek R1' };
  document.getElementById('model-label').textContent = labels[state.model] || state.model;
  document.getElementById('model-dropdown').classList.remove('open');
  document.getElementById('model-btn').classList.remove('open');
  document.removeEventListener('click', outsideModelClose, true);
  if (save && state.currentSessionId) {
    const s = getSessionById(state.currentSessionId);
    if (s) { s.model = state.model; StorageManager.saveSessions(); }
  }
}

// ============================================================
//  SIDEBAR
// ============================================================
function toggleSidebar(forceOpen) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.contains('open');
  if (forceOpen === true || !isOpen) {
    sb.classList.add('open');
    ov.classList.add('open');
  } else {
    sb.classList.remove('open');
    ov.classList.remove('open');
  }
}

// ============================================================
//  EXPORT / IMPORT
// ============================================================
function exportData() {
  const data = {
    version: 3,
    config: StorageManager.loadConfig(),
    sessions: state.sessions,
    activeId: state.currentSessionId,
    exportDate: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `DeepSeek-Backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 导出成功');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (data.config) StorageManager.saveConfig(data.config);
      if (Array.isArray(data.sessions)) {
        state.sessions = data.sessions;
        StorageManager.saveSessions();
      }
      if (data.activeId) localStorage.setItem(ACTIVE_ID_KEY, data.activeId);
      showToast('✓ 导入成功，正在刷新…');
      setTimeout(() => location.reload(), 900);
    } catch {
      showToast('❌ 解析失败：无效的备份文件');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
//  TOAST
// ============================================================
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
//  INITIALIZATION
// ============================================================
(function init() {
  // 1. Migrate old data formats
  StorageManager.migrate();

  // 2. Load config
  const cfg = StorageManager.loadConfig();
  state.apiKey        = cfg.apiKey        || '';
  state.baseUrl       = cfg.baseUrl       || 'https://api.deepseek.com';
  state.systemPrompt  = cfg.systemPrompt  || '';
  state.enableSliding = cfg.enableSliding !== false;
  state.maxContextSize= cfg.maxContextSize || 20;

  // 3. Load and validate sessions
  state.sessions = StorageManager.loadSessions();

  // 4. Determine active session
  const activeId = StorageManager.getActiveId();

  if (state.sessions.length === 0) {
    createNewSession(false);
    switchSession(state.sessions[0].id);
  } else {
    const target = state.sessions.find(s => s.id === activeId) || state.sessions[0];
    switchSession(target.id);
  }

  // 5. Focus input
  document.getElementById('textarea').focus();
})();

// ============================================================
//  PWA: page visibility — re-check scroll on return to foreground
// ============================================================
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !isUserScrolledUp) {
    scrollToBottom(false);
  }
});

// Save on page hide (PWA background)
window.addEventListener('pagehide', () => {
  StorageManager.saveSessions();
});

// ============================================================
//  PWA: SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('✓ Service Worker 已注册', reg.scope);
        // Force update check
        reg.update().catch(() => {});
      })
      .catch(err => console.warn('⚠ Service Worker 注册失败', err));
  });
}
