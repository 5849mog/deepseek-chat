<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DeepSeek Chat</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdfbf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DeepSeek">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- KaTeX (synchronous, zero-wait, works in file:// and all environments) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <!-- mhchem: chemical equations  \ce{H2O -> H+ + OH-} -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"></script>
  <!-- copy-tex: click a rendered formula to copy its LaTeX source -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/copy-tex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/copy-tex.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Core palette ──────────────────────────────────────────── */
      --bg:           #faf9f7;
      --bg2:          #f2f0ec;
      --bg3:          #e8e4dd;
      --sidebar-bg:   #f2f0eb;
      --sidebar-hover:#e9e5de;
      --sidebar-act:  #e0dbd2;
      --border:       #e5e1da;
      --border2:      #cec9be;
      --text:         #1a1714;
      --text2:        #56524c;
      --text3:        #9a948c;
      --user-bg:      #ede9e2;
      --user-border:  #dfd9d0;
      --accent:       #cf6736;
      --accent2:      #a84f25;
      --accent-rgb:   207,103,54;
      /* ── Think block — warm violet (mirrors Anthropic reasoning) ─ */
      --think-bg:        #f5f3fb;
      --think-bg-done:   #f8f7fc;
      --think-border:    #c5bce8;
      --think-accent:    #7c6fc9;
      --think-accent-dim:#a89fe0;
      --think-text:      #5a5270;
      --think-text-dim:  #8c85a8;
      /* ── Code ───────────────────────────────────────────────────── */
      --code-bg:      #f3f1ec;
      --code-border:  #e2ddd5;
      /* ── Shadows ─────────────────────────────────────────────────  */
      --shadow-xs:    0 1px 2px rgba(0,0,0,.03);
      --shadow-sm:    0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
      --shadow:       0 2px 8px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:    0 6px 20px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg:    0 16px 48px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
      /* ── Tokens ──────────────────────────────────────────────────  */
      --font:         'DM Sans', system-ui, -apple-system, sans-serif;
      --mono:         'DM Mono', 'Fira Code', ui-monospace, monospace;
      --header-h:     54px;
      --sidebar-w:    264px;
      --radius-sm:    8px;
      --radius:       12px;
      --radius-lg:    18px;
      --radius-xl:    22px;
      --ease-spring:  cubic-bezier(0.34, 1.3, 0.64, 1);
      --ease-out:     cubic-bezier(0.2, 0, 0, 1);
      --ease-in-out:  cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: var(--font); background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    #root-layout { display: flex; height: 100dvh; width: 100%; position: relative; }

    /* ════════════════════════════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar-w); background: var(--sidebar-bg);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      flex-shrink: 0; transition: transform 0.3s var(--ease-in-out);
      z-index: 200;
    }
    .sidebar-header { padding: 14px 14px 8px; flex-shrink: 0; }
    .new-chat-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 9px 13px; font-family: var(--font); font-size: 13.5px; font-weight: 500;
      color: var(--text); cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-xs);
      gap: 8px;
    }
    .new-chat-btn:hover { background: #fff; border-color: var(--border2); box-shadow: var(--shadow-sm); }
    .new-chat-btn:active { transform: scale(.98); }
    .new-chat-btn svg { width: 15px; height: 15px; color: var(--text3); flex-shrink: 0; }
    .new-chat-btn span { flex: 1; text-align: left; }

    #session-list {
      flex: 1; overflow-y: auto; padding: 6px 10px; display: flex; flex-direction: column; gap: 1px;
      overscroll-behavior: contain;
    }
    #session-list::-webkit-scrollbar { width: 3px; }
    #session-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 2px; }
    #session-list:hover::-webkit-scrollbar-thumb { background: var(--border2); }

    .session-group-label {
      font-size: 10.5px; font-weight: 700; color: var(--text3); letter-spacing: .07em;
      text-transform: uppercase; padding: 12px 10px 3px; user-select: none;
    }
    .session-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s;
      color: var(--text2); position: relative;
    }
    .session-item:hover { background: var(--sidebar-hover); color: var(--text); }
    .session-item.active { background: var(--sidebar-act); color: var(--text); font-weight: 500; }
    .session-title { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 6px; line-height: 1.4; }
    .session-meta { font-size: 10.5px; color: var(--text3); white-space: nowrap; }
    .session-item-inner { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }

    .delete-session-btn {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: var(--text3); border-radius: 5px; cursor: pointer;
      opacity: 0; transition: all 0.12s; flex-shrink: 0;
    }
    .session-item:hover .delete-session-btn { opacity: 1; }
    .delete-session-btn:hover { background: rgba(220,53,69,.1); color: #c9303a; }

    .sidebar-footer {
      padding: 10px 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 1px;
    }
    .tool-btn {
      display: flex; align-items: center; gap: 9px; width: 100%; background: transparent; border: none;
      padding: 8px 10px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 500;
      color: var(--text2); cursor: pointer; transition: background 0.1s; text-align: left;
    }
    .tool-btn:hover { background: var(--sidebar-hover); color: var(--text); }
    .tool-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    #sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.32);
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 199;
    }
    #sidebar-overlay.open { display: block; }

    /* ════════════════════════════════════════════════════════════
       HEADER
    ════════════════════════════════════════════════════════════ */
    #app { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; overflow: hidden; }

    #header {
      position: sticky; top: 0; z-index: 100; height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; background: rgba(250,249,247,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 8px; }

    .menu-toggle {
      display: none; width: 32px; height: 32px; border: none; background: transparent;
      border-radius: var(--radius-sm); color: var(--text2); cursor: pointer;
      align-items: center; justify-content: center; transition: background .15s;
    }
    .menu-toggle:hover { background: var(--bg2); }

    #logo {
      width: 28px; height: 28px;
      background: linear-gradient(145deg, #e8865a, #c95e30);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 2px 6px rgba(201,94,48,.25);
    }
    #logo svg { width: 14px; height: 14px; }

    #model-selector-wrap { position: relative; }
    #model-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 10px 5px 11px;
      background: transparent; border: 1px solid transparent; border-radius: 20px;
      font-family: var(--font); font-size: 13.5px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    #model-btn:hover { background: var(--bg2); border-color: var(--border); }
    #model-btn .chevron { transition: transform .2s var(--ease-in-out); color: var(--text3); }
    #model-btn.open .chevron { transform: rotate(180deg); }

    #model-dropdown {
      display: none; position: absolute; top: calc(100% + 7px); left: 0;
      min-width: 240px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; z-index: 300;
      animation: dropIn .18s var(--ease-spring);
    }
    #model-dropdown.open { display: block; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-8px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }

    .model-option {
      padding: 12px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .model-option:last-child { border-bottom: none; }
    .model-option:hover, .model-option.selected { background: var(--bg2); }
    .model-option-name { font-size: 13.5px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .model-option-desc { font-size: 11.5px; color: var(--text3); line-height: 1.4; }
    .think-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 1.5px 6px; border-radius: 5px;
      background: linear-gradient(135deg, var(--think-accent), #5b4faa); color: #fff;
    }
    .checkmark { color: var(--accent); font-size: 13px; margin-left: auto; }

    #header-right { display: flex; align-items: center; gap: 6px; }

    /* ════════════════════════════════════════════════════════════
       MESSAGES
    ════════════════════════════════════════════════════════════ */
    #messages-wrap {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; display: flex; justify-content: center;
      scroll-behavior: smooth;
    }
    #messages-wrap::-webkit-scrollbar { width: 4px; }
    #messages-wrap::-webkit-scrollbar-track { background: transparent; }
    #messages-wrap::-webkit-scrollbar-thumb { background: transparent; border-radius: 2px; transition: background .2s; }
    #messages-wrap:hover::-webkit-scrollbar-thumb { background: var(--border2); }

    #messages { width: 100%; max-width: 860px; padding: 28px 20px 48px; display: flex; flex-direction: column; gap: 28px; }

    .msg-row { display: flex; animation: fadeUp .24s var(--ease-out); width: 100%; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* User bubble */
    .msg-row.user { justify-content: flex-end; }
    .msg-row.user .bubble {
      max-width: 82%;
      background: var(--user-bg); border: 1px solid var(--user-border);
      border-radius: 20px 20px 5px 20px; padding: 11px 16px;
      font-size: 15px; line-height: 1.65; color: var(--text);
      word-break: break-word; white-space: pre-wrap;
      box-shadow: var(--shadow-xs);
    }

    /* Assistant row */
    .msg-row.assistant { justify-content: flex-start; gap: 12px; align-items: flex-start; }
    .assistant-avatar {
      width: 28px; height: 28px; flex-shrink: 0; margin-top: 3px;
      background: linear-gradient(145deg, #e8865a, #c95e30);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 5px rgba(201,94,48,.22);
    }
    .assistant-avatar svg { width: 14px; height: 14px; }
    .assistant-content { flex: 1; min-width: 0; max-width: calc(100% - 40px); display: flex; flex-direction: column; gap: 12px; }

    /* ════════════════════════════════════════════════════════════
       THINK BLOCK — Anthropic reasoning style
    ════════════════════════════════════════════════════════════ */
    .think-block {
      position: relative;
      border: 1px solid var(--think-border);
      border-left: 3px solid var(--think-accent-dim);
      border-radius: var(--radius);
      background: var(--think-bg);
      overflow: hidden;
      transition: border-color .3s, background .3s;
    }
    .think-block.thinking {
      border-left-color: var(--think-accent);
      background: var(--think-bg);
    }
    /* Subtle top shimmer while thinking */
    .think-block.thinking::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--think-accent), transparent);
      background-size: 200% 100%;
      animation: shimmerBar 1.8s linear infinite;
    }
    @keyframes shimmerBar {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .think-block.done { border-left-color: var(--think-accent-dim); background: var(--think-bg-done); }
    .think-block.done::before { display: none; }

    .think-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 13px; cursor: pointer; user-select: none;
      transition: background .12s;
    }
    .think-header:hover { background: rgba(124,111,201,.06); }

    /* Animated thinking icon — three pulsing circles */
    .think-icon-thinking {
      display: flex; align-items: center; gap: 3px; flex-shrink: 0; width: 24px;
    }
    .think-icon-thinking span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--think-accent); border-radius: 50%;
      animation: thinkPulse 1.4s ease-in-out infinite;
    }
    .think-icon-thinking span:nth-child(2) { animation-delay: .2s; }
    .think-icon-thinking span:nth-child(3) { animation-delay: .4s; }
    @keyframes thinkPulse { 0%,80%,100%{opacity:.25;transform:scale(.75)} 40%{opacity:1;transform:scale(1)} }

    /* Done icon — small checkmark circle */
    .think-icon-done {
      width: 16px; height: 16px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, var(--think-accent), #5b4faa);
      display: flex; align-items: center; justify-content: center;
    }
    .think-icon-done svg { width: 9px; height: 9px; }

    .think-label {
      flex: 1; font-size: 12.5px; font-weight: 600;
      color: var(--think-text); letter-spacing: .01em;
    }
    .think-label-secondary {
      font-size: 11px; font-weight: 400; color: var(--think-text-dim);
      margin-left: 5px;
    }

    .think-chevron {
      color: var(--think-text-dim); transition: transform .22s var(--ease-in-out); flex-shrink: 0;
    }
    .think-block.open .think-chevron { transform: rotate(180deg); }

    /* Body — smooth expand */
    .think-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height .35s var(--ease-in-out), padding .25s;
      padding: 0 14px;
    }
    .think-block.open .think-body {
      max-height: 1600px;
      overflow-y: auto;
      padding: 0 14px 13px;
    }
    .think-body::-webkit-scrollbar { width: 3px; }
    .think-body::-webkit-scrollbar-thumb { background: var(--think-border); border-radius: 2px; }

    /* Divider between header and body */
    .think-body-inner {
      border-top: 1px solid rgba(197,188,232,.45);
      padding-top: 11px;
    }

    .think-md {
      font-size: 13px; line-height: 1.7;
      color: var(--think-text); word-break: break-word;
      font-style: italic;
    }
    .think-md p { margin-bottom: 8px; }
    .think-md p:last-child { margin-bottom: 0; }
    .think-md code { font-style: normal; font-size: 12px; }
    .think-md strong { color: var(--think-text); font-style: normal; }

    /* ════════════════════════════════════════════════════════════
       MARKDOWN CONTENT
    ════════════════════════════════════════════════════════════ */
    .katex-display { overflow-x: auto; overflow-y: hidden; margin: 16px 0; padding: 4px 0; }
    .katex-display > .katex { text-align: center; }
    .katex { font-size: 1.06em; }
    .math-display {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 4px 0; margin: 12px 0;
    }
    .math-display .katex-display { margin: 0; }
    .katex-err {
      font-family: var(--mono); font-size: 12.5px; color: var(--accent2);
      background: #fff3ed; border: 1px dashed var(--accent);
      border-radius: 5px; padding: 2px 6px; cursor: help;
    }

    .md-content { font-size: 15px; line-height: 1.72; color: var(--text); word-break: break-word; }
    .md-content > *:last-child { margin-bottom: 0 !important; }
    .md-content p { margin-bottom: 13px; }
    .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
      font-weight: 650; margin: 22px 0 9px; line-height: 1.3; color: var(--text);
      letter-spacing: -.01em;
    }
    .md-content h1 { font-size: 20px; } .md-content h2 { font-size: 17.5px; }
    .md-content h3 { font-size: 15.5px; } .md-content h4 { font-size: 14px; }
    .md-content ul, .md-content ol { padding-left: 22px; margin-bottom: 13px; }
    .md-content li { margin-bottom: 5px; line-height: 1.65; }
    .md-content li > p { margin-bottom: 4px; }
    .md-content blockquote {
      border-left: 3px solid var(--border2); padding: 8px 14px; margin: 14px 0;
      color: var(--text2); background: var(--bg2); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .md-content code:not(pre code) {
      font-family: var(--mono); font-size: 13px; background: var(--code-bg);
      border: 1px solid var(--border); border-radius: 5px; padding: 1.5px 5px; color: var(--accent2);
    }
    .md-content pre {
      background: var(--code-bg); border: 1px solid var(--code-border);
      border-radius: var(--radius); overflow: hidden; margin: 14px 0;
      box-shadow: var(--shadow-xs);
    }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 13px; background: rgba(0,0,0,.025); border-bottom: 1px solid var(--code-border);
    }
    .code-lang {
      font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .copy-btn {
      font-family: var(--font); font-size: 11px; font-weight: 600; color: var(--text3);
      background: none; border: none; cursor: pointer; display: flex; align-items: center;
      gap: 4px; padding: 3px 8px; border-radius: 5px; transition: all .15s;
    }
    .copy-btn:hover { background: var(--bg2); color: var(--text2); }
    .copy-btn.copied { color: #2e7d32; }
    .md-content pre code {
      font-family: var(--mono); font-size: 12.5px; display: block;
      padding: 13px 15px; overflow-x: auto; background: none !important; line-height: 1.65;
    }
    .md-content table {
      width: 100%; border-collapse: collapse; font-size: 13.5px; margin: 14px 0;
      display: block; overflow-x: auto; border-radius: var(--radius-sm);
    }
    .md-content th, .md-content td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
    .md-content th { background: var(--bg2); font-weight: 600; font-size: 12.5px; }
    .md-content a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    .md-content a:hover { color: var(--accent2); }

    /* Typing cursor */
    .cursor {
      display: inline-block; width: 2px; height: 1em; background: var(--text);
      vertical-align: text-bottom; animation: blink .9s step-start infinite;
      border-radius: 1px; margin-left: 1px; opacity: .75;
    }
    @keyframes blink { 0%,100%{opacity:.75} 50%{opacity:0} }

    /* Message action buttons (hover) */
    .msg-actions {
      display: flex; align-items: center; gap: 3px;
      opacity: 0; transition: opacity .15s; margin-top: 6px;
    }
    .msg-row.assistant:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      display: flex; align-items: center; gap: 4px; padding: 4px 8px;
      background: transparent; border: none; border-radius: 6px; cursor: pointer;
      font-family: var(--font); font-size: 11.5px; color: var(--text3);
      transition: all .12s;
    }
    .msg-action-btn:hover { background: var(--bg2); color: var(--text2); }
    .msg-action-btn svg { width: 13px; height: 13px; }
    .msg-action-btn.copied { color: #2e7d32; }

    /* ════════════════════════════════════════════════════════════
       WELCOME SCREEN
    ════════════════════════════════════════════════════════════ */
    #welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px 40px; text-align: center; gap: 14px;
      min-height: calc(100dvh - var(--header-h) - 120px);
    }
    #welcome-logo {
      width: 60px; height: 60px;
      background: linear-gradient(145deg, #e8865a, #c95e30);
      border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(201,94,48,.28), 0 2px 8px rgba(201,94,48,.15);
    }
    #welcome-logo svg { width: 30px; height: 30px; }
    #welcome h1 { font-size: 23px; font-weight: 700; color: var(--text); margin-top: 4px; letter-spacing: -.02em; }
    #welcome p { font-size: 14.5px; color: var(--text3); line-height: 1.6; max-width: 290px; }
    .welcome-chips { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 370px; margin-top: 14px; }
    .chip {
      padding: 11px 16px; background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13.5px; color: var(--text2); cursor: pointer;
      text-align: left; transition: all .15s; font-family: var(--font);
      box-shadow: var(--shadow-xs);
    }
    .chip:hover { border-color: var(--border2); color: var(--text); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .chip:active { transform: scale(.98); }

    /* ════════════════════════════════════════════════════════════
       INPUT AREA
    ════════════════════════════════════════════════════════════ */
    #input-area {
      flex-shrink: 0; padding: 10px 16px 14px; background: var(--bg);
      display: flex; justify-content: center;
      border-top: 1px solid var(--border);
    }
    #input-bar {
      width: 100%; max-width: 860px; display: flex; align-items: flex-end; gap: 8px;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: var(--radius-xl); padding: 8px 8px 8px 16px;
      transition: border-color .15s, box-shadow .15s;
      box-shadow: var(--shadow-sm);
    }
    #input-bar:focus-within {
      border-color: var(--border2);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .09), var(--shadow);
    }
    #textarea {
      flex: 1; font-family: var(--font); font-size: 15px; line-height: 1.55;
      color: var(--text); background: transparent; border: none; outline: none;
      resize: none; min-height: 24px; max-height: 180px;
      padding: 5px 0; overflow-y: auto;
    }
    #textarea::placeholder { color: var(--text3); }
    #send-btn {
      width: 34px; height: 34px; flex-shrink: 0; border: none; background: var(--text);
      color: #fff; border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    #send-btn:hover:not(:disabled) { background: #000; transform: scale(1.04); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { background: var(--bg3); cursor: not-allowed; }
    #send-btn.empty:not(:disabled) { background: var(--bg2); color: var(--text3); cursor: default; transform: none; }
    #send-btn svg { width: 15px; height: 15px; }
    #stop-btn {
      width: 34px; height: 34px; flex-shrink: 0; border: 1.5px solid var(--border2);
      background: transparent; color: var(--text2); border-radius: var(--radius);
      cursor: pointer; display: none; align-items: center; justify-content: center; transition: all .15s;
    }
    #stop-btn.visible { display: flex; }
    #stop-btn:hover { background: var(--bg2); color: var(--text); }
    #stop-btn svg { width: 13px; height: 13px; }

    /* ════════════════════════════════════════════════════════════
       SETTINGS
    ════════════════════════════════════════════════════════════ */
    #settings-overlay {
      visibility: hidden; opacity: 0;
      position: fixed; inset: 0; background: rgba(0,0,0,.3);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 400; transition: opacity .25s, visibility .25s;
      display: flex; align-items: flex-end; justify-content: center;
    }
    #settings-overlay.open { visibility: visible; opacity: 1; }
    #settings-sheet {
      width: 100%; max-width: 520px; background: var(--bg);
      border-radius: 22px 22px 0 0; padding: 14px 20px 28px;
      transform: translateY(100%); transition: transform .32s var(--ease-spring);
      display: flex; flex-direction: column; max-height: 92dvh;
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
    }
    #settings-overlay.open #settings-sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 14px; }
    .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); letter-spacing: -.01em; }
    .settings-scroll-area { overflow-y: auto; overflow-x: hidden; margin: 0 -20px; padding: 0 20px 16px; flex: 1; }
    .settings-scroll-area::-webkit-scrollbar { width: 4px; }
    .settings-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .setting-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 13px; box-shadow: var(--shadow-xs); }
    .card-title { font-size: 13.5px; font-weight: 700; margin-bottom: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .field-label { font-size: 11.5px; font-weight: 700; color: var(--text2); letter-spacing: .03em; margin-bottom: 5px; display: block; text-transform: uppercase; }
    .field-input { width: 100%; font-family: var(--mono); font-size: 13px; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; transition: all .15s; margin-bottom: 5px; }
    .field-input:focus { border-color: var(--border2); background: #fff; box-shadow: 0 0 0 3px rgba(var(--accent-rgb),.08); }
    .field-hint { font-size: 11.5px; color: var(--text3); line-height: 1.5; margin-bottom: 13px; }
    .field-hint:last-child { margin-bottom: 0; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 4px; border-top: 1px solid var(--border); margin-top: 10px; }
    .toggle-info { flex: 1; padding-right: 16px; }
    .toggle-label { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .toggle-desc { font-size: 11.5px; color: var(--text3); margin-top: 3px; line-height: 1.4; }
    .switch { position: relative; display: inline-block; width: 42px; height: 23px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border2); transition: .25s; border-radius: 23px; }
    .slider::before { position: absolute; content: ""; height: 17px; width: 17px; left: 3px; bottom: 3px; background: white; transition: .25s var(--ease-spring); border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.18); }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(19px); }
    #max-context-wrap { margin-top: 10px; padding-top: 12px; border-top: 1px dashed var(--border); }
    #max-context-wrap.hidden { display: none; }
    #storage-warning { display: none; background: #fff8e1; border: 1px solid #ffca28; border-radius: var(--radius-sm); padding: 9px 13px; font-size: 12.5px; color: #7a5c00; margin-bottom: 12px; align-items: center; gap: 8px; }
    #storage-warning.visible { display: flex; }
    .save-btn { width: 100%; padding: 13px; background: var(--text); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 14.5px; font-weight: 700; cursor: pointer; transition: all .15s; margin-top: 4px; flex-shrink: 0; letter-spacing: -.01em; }
    .save-btn:hover { background: #000; transform: translateY(-1px); box-shadow: var(--shadow); }
    .save-btn:active { transform: translateY(1px); box-shadow: none; }

    /* ════════════════════════════════════════════════════════════
       MISC
    ════════════════════════════════════════════════════════════ */
    #scroll-down {
      position: fixed; bottom: 88px; right: 16px; width: 34px; height: 34px;
      background: var(--bg); border: 1px solid var(--border2); border-radius: 50%;
      box-shadow: var(--shadow-md); display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 50; color: var(--text2); transition: all .18s;
    }
    #scroll-down.visible { display: flex; }
    #scroll-down:hover { background: var(--bg2); transform: scale(1.05); }
    #scroll-down svg { width: 15px; height: 15px; }

    #toast {
      position: fixed; bottom: 96px; left: 50%;
      transform: translateX(-50%) translateY(16px) scale(.95);
      background: rgba(26,23,20,.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 13px; font-weight: 500; padding: 9px 18px;
      border-radius: 24px; opacity: 0; pointer-events: none;
      transition: all .28s var(--ease-spring); z-index: 500; white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

    .error-msg { color: #c9303a; font-size: 13.5px; display: flex; align-items: center; gap: 6px; padding: 8px 0; }
    .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }

    .hljs { background: transparent !important; padding: 0 !important; }

    /* ════════════════════════════════════════════════════════════
       MOBILE  ≤ 768px
    ════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      :root { --header-h: 50px; }
      .menu-toggle { display: flex; }
      #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #messages { padding: 16px 14px 32px; gap: 22px; }
      .msg-row.user .bubble { max-width: 92%; font-size: 14.5px; }
      .md-content { font-size: 14.5px; line-height: 1.7; }
      #input-area {
        padding: 8px 12px calc(12px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--border);
      }
      #scroll-down { bottom: calc(82px + env(safe-area-inset-bottom)); right: 12px; }
      #toast { bottom: calc(88px + env(safe-area-inset-bottom)); }

      /* Bigger touch targets */
      .delete-session-btn { opacity: 1; width: 28px; height: 28px; }
      .session-item { padding: 10px 10px; }
      .copy-btn { padding: 5px 10px; }

      /* Remove hover actions on mobile (use long press instead) */
      .msg-actions { display: none !important; }

      /* Touch feedback */
      button, a, .session-item, .chip { -webkit-tap-highlight-color: transparent; }
      .chip:active { transform: scale(.97); background: var(--bg3); }
      .new-chat-btn:active { background: var(--bg2); }
      .session-item:active { background: var(--sidebar-act); }
      .tool-btn:active { background: var(--sidebar-hover); }
      #send-btn:active:not(:disabled) { transform: scale(.92); }
      #stop-btn:active { background: var(--bg3); }
      .model-option:active { background: var(--bg3); }

      /* Think block on mobile */
      .think-block.open .think-body { max-height: 55dvh; }
      .think-md { font-size: 12.5px; }
    }

    /* ════════════════════════════════════════════════════════════
       ANIMATIONS
    ════════════════════════════════════════════════════════════ */
    @keyframes sessionFlash {
      0%   { background: var(--sidebar-act); }
      40%  { background: rgba(var(--accent-rgb), .2); }
      100% { background: var(--sidebar-act); }
    }
    .session-item.flash { animation: sessionFlash .5s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Text selection */
    .msg-row { -webkit-user-select: none; user-select: none; }
    .msg-row.user .bubble { -webkit-user-select: text; user-select: text; }
    .md-content { -webkit-user-select: text; user-select: text; }
    .think-md { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>

<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
<div id="root-layout">
  <div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="createNewSession()">
        <span>新建对话</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="session-list"></div>
    <div class="sidebar-footer">
      <button class="tool-btn" onclick="triggerImport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导入数据
      </button>
      <button class="tool-btn" onclick="exportData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        导出备份
      </button>
      <button class="tool-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        偏好设置
      </button>
    </div>
  </div>
  <div id="app">
    <div id="header">
      <div id="header-left">
        <button class="menu-toggle" onclick="toggleSidebar(true)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div id="model-selector-wrap">
          <button id="model-btn" onclick="toggleModelDropdown()">
            <span id="model-label">DeepSeek V3</span>
            <svg class="chevron" viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M8 10.5L3 5.5h10L8 10.5z"/></svg>
          </button>
          <div id="model-dropdown">
            <div class="model-option selected" data-model="deepseek-chat" onclick="selectModel(this)">
              <div class="model-option-name">DeepSeek V3<span class="checkmark" id="check-deepseek-chat">✓</span></div>
              <div class="model-option-desc">通用对话 · 快速高效</div>
            </div>
            <div class="model-option" data-model="deepseek-reasoner" onclick="selectModel(this)">
              <div class="model-option-name">DeepSeek R1<span class="think-badge">思维链</span><span class="checkmark" id="check-deepseek-reasoner" style="display:none">✓</span></div>
              <div class="model-option-desc">深度推理 · 逐步思考</div>
            </div>
          </div>
        </div>
      </div>
      <div id="header-right"></div>
    </div>
    <div id="messages-wrap">
      <div id="messages"></div>
    </div>
    <button id="scroll-down" onclick="scrollToBottom(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </button>
    <div id="input-area">
      <div id="input-bar">
        <textarea id="textarea" placeholder="给 DeepSeek 发送消息…" rows="1" onkeydown="handleKeydown(event)" oninput="handleInput()"></textarea>
        <button id="stop-btn" onclick="stopStream()">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="7" width="10" height="10" rx="1.5"/></svg>
        </button>
        <button id="send-btn" class="empty" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="settings-overlay" onclick="handleOverlayClick(event)">
  <div id="settings-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙️ 偏好设置</div>
    <div class="settings-scroll-area">
      <div id="storage-warning" class="setting-card" style="background:#fff8e6;border-color:#f0c040;">
        ⚠️ <span id="storage-warning-text">存储空间接近上限，建议导出备份并清理旧对话。</span>
      </div>
      <div class="setting-card">
        <div class="card-title">🔌 接口连接</div>
        <label class="field-label">API Key</label>
        <input class="field-input" id="api-key-input" type="password" placeholder="sk-...">
        <div class="field-hint">在 platform.deepseek.com 获取密钥。</div>
        <label class="field-label" style="margin-top:4px;">Base URL（可选）</label>
        <input class="field-input" id="base-url-input" type="text" placeholder="https://api.deepseek.com">
        <div class="field-hint">留空使用官方地址。支持自定义反向代理端点。</div>
      </div>
      <div class="setting-card">
        <div class="card-title">🧠 模型与上下文</div>
        <label class="field-label">系统提示词 (System Prompt)</label>
        <textarea class="field-input" id="system-prompt-input" rows="2" placeholder="例如：你是一个幽默的助手。" style="resize:vertical;font-family:var(--font);"></textarea>
        <div class="toggle-row">
          <div class="toggle-info">
            <div class="toggle-label">滑动上下文限制</div>
            <div class="toggle-desc">开启后自动截断较老记录，节省 Token 消耗（界面依然展示全部记录）。</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="sliding-context-input" onchange="toggleContextSizeUI()">
            <span class="slider"></span>
          </label>
        </div>
        <div id="max-context-wrap">
          <label class="field-label">最大保留历史消息数</label>
          <input class="field-input" id="max-context-input" type="number" min="2" max="200" placeholder="例如：20">
          <div class="field-hint">每次对话最多携带最新几条记录发送给模型。</div>
        </div>
      </div>
      <div class="setting-card">
        <div class="card-title">🗄️ 存储状态</div>
        <div style="font-size:13.5px;color:var(--text2);line-height:1.6;" id="storage-info-text">正在计算…</div>
        <button class="tool-btn" style="margin-top:10px;padding-left:0;" onclick="trimOldSessions()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          清理30天前的旧对话
        </button>
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">保存并生效</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const SESSIONS_KEY  = 'ds_sessions_v3';
const ACTIVE_ID_KEY = 'ds_active_session_id';
const CFG_KEY       = 'ds_cfg_v2';
const MAX_SESSIONS  = 200;        // hard cap on number of sessions
const MAX_HISTORY   = 500;        // hard cap on messages per session
const STORAGE_WARN_BYTES = 4 * 1024 * 1024; // warn at 4 MB

// ============================================================
//  APP STATE
// ============================================================
const state = {
  model: 'deepseek-chat',
  apiKey: '',
  baseUrl: 'https://api.deepseek.com',
  systemPrompt: '',
  enableSliding: true,
  maxContextSize: 20,
  sessions: [],
  currentSessionId: null,
  isStreaming: false,
  abortController: null,
  streamingSessionId: null,   // track which session is streaming
};

// ============================================================
//  STORAGE MANAGER  ← core fix for disappearing conversations
// ============================================================
const StorageManager = {
  /** Robustly save sessions. Returns true on success. */
  saveSessions() {
    try {
      const serialized = JSON.stringify(state.sessions);
      localStorage.setItem(SESSIONS_KEY, serialized);
      if (state.currentSessionId) {
        localStorage.setItem(ACTIVE_ID_KEY, state.currentSessionId);
      }
      return true;
    } catch (e) {
      if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
        // Emergency: trim oldest sessions and retry
        console.warn('[Storage] Quota exceeded, trimming…');
        this._emergencyTrim();
        try {
          localStorage.setItem(SESSIONS_KEY, JSON.stringify(state.sessions));
          showToast('⚠ 存储空间不足，已自动清理旧对话');
          return true;
        } catch (e2) {
          showToast('❌ 存储失败，请导出备份后清理对话');
          console.error('[Storage] Save failed even after trim:', e2);
          return false;
        }
      }
      console.error('[Storage] Unexpected save error:', e);
      return false;
    }
  },

  /** Load and VALIDATE sessions from localStorage. */
  loadSessions() {
    try {
      const raw = localStorage.getItem(SESSIONS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .filter(s => s && typeof s.id === 'string' && Array.isArray(s.history))
        .map(s => ({
          id: s.id,
          title: typeof s.title === 'string' && s.title.trim() ? s.title.trim() : '新对话',
          model: typeof s.model === 'string' ? s.model : 'deepseek-chat',
          history: s.history
            .filter(m => m && (m.role === 'user' || m.role === 'assistant'))
            .map(m => ({
              role: m.role,
              content: typeof m.content === 'string' ? m.content : '',
              reasoning: typeof m.reasoning === 'string' ? m.reasoning : '',
            }))
            .slice(-MAX_HISTORY),
          updatedAt: typeof s.updatedAt === 'number' ? s.updatedAt : Date.now(),
          createdAt: typeof s.createdAt === 'number' ? s.createdAt : Date.now(),
        }))
        .slice(0, MAX_SESSIONS);
    } catch (e) {
      console.error('[Storage] Load/parse failed, resetting:', e);
      return [];
    }
  },

  loadConfig() {
    try {
      return JSON.parse(localStorage.getItem(CFG_KEY) || '{}');
    } catch { return {}; }
  },

  saveConfig(cfg) {
    try { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); } catch {}
  },

  getActiveId() {
    return localStorage.getItem(ACTIVE_ID_KEY) || null;
  },

  /** Estimate current usage in bytes */
  getUsageBytes() {
    try {
      let total = 0;
      for (const k of [SESSIONS_KEY, CFG_KEY, ACTIVE_ID_KEY]) {
        const v = localStorage.getItem(k);
        if (v) total += v.length * 2; // UTF-16
      }
      return total;
    } catch { return 0; }
  },

  _emergencyTrim() {
    // Remove sessions beyond 30, trimming from oldest first
    state.sessions.sort((a, b) => b.updatedAt - a.updatedAt);
    state.sessions.splice(30); // keep newest 30
    // Also trim each session's history
    state.sessions.forEach(s => {
      if (s.history.length > 40) s.history = s.history.slice(-40);
    });
  },

  /** Migrate old format if present */
  migrate() {
    // v2 → v3 key rename
    const old = localStorage.getItem('ds_sessions_v2');
    if (old && !localStorage.getItem(SESSIONS_KEY)) {
      localStorage.setItem(SESSIONS_KEY, old);
    }
    // legacy single-session format
    const oldSession = localStorage.getItem('ds_chat_session');
    if (oldSession && !localStorage.getItem(SESSIONS_KEY)) {
      try {
        const s = JSON.parse(oldSession);
        const history = Array.isArray(s.history) ? s.history : [];
        const sessions = [{
          id: genId(), title: history[0]?.content?.slice(0,15) || '新对话',
          model: s.model || 'deepseek-chat', history,
          updatedAt: Date.now(), createdAt: Date.now(),
        }];
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
        localStorage.removeItem('ds_chat_session');
      } catch {}
    }
  },
};

// ============================================================
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatRelativeDate(ts) {
  const now = Date.now();
  const diff = now - ts;
  const day = 86400000;
  if (diff < day) return '今天';
  if (diff < 2 * day) return '昨天';
  if (diff < 7 * day) return '本周';
  if (diff < 30 * day) return '本月';
  const d = new Date(ts);
  return `${d.getFullYear()}年${d.getMonth()+1}月`;
}

function katexRender(src, display) {

  let s = src

    .replace(/\u00A0/g, ' ');                            // non-breaking space → space

  const subMap = {'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9','ₐ':'a','ₑ':'e','ₒ':'o','ₙ':'n','ₚ':'p','ₓ':'x'};
  const supMap = {'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','ⁿ':'n'};
  s = s.replace(/[₀₁₂₃₄₅₆₇₈₉ₐₑₒₙₚₓ]+/g, m => '_{' + m.split('').map(c => subMap[c]||c).join('') + '}');
  s = s.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹ⁿ]+/g, m => '^{' + m.split('').map(c => supMap[c]||c).join('') + '}');

  // (AI often outputs α β γ directly; KaTeX needs \alpha \beta \gamma)
  const greekMap = {
    'α':'\\alpha',   'β':'\\beta',    'γ':'\\gamma',   'δ':'\\delta',
    'ε':'\\epsilon', 'ζ':'\\zeta',    'η':'\\eta',     'θ':'\\theta',
    'ι':'\\iota',    'κ':'\\kappa',   'λ':'\\lambda',  'μ':'\\mu',
    'ν':'\\nu',      'ξ':'\\xi',      'ο':'o',         'π':'\\pi',
    'ρ':'\\rho',     'σ':'\\sigma',   'τ':'\\tau',     'υ':'\\upsilon',
    'φ':'\\varphi',  'χ':'\\chi',     'ψ':'\\psi',     'ω':'\\omega',
    'Α':'A',         'Β':'B',         'Γ':'\\Gamma',   'Δ':'\\Delta',
    'Ε':'E',         'Ζ':'Z',         'Η':'H',         'Θ':'\\Theta',
    'Ι':'I',         'Κ':'K',         'Λ':'\\Lambda',  'Μ':'M',

    '≡':'\\equiv',   '≪':'\\ll',      '≫':'\\gg',      '∝':'\\propto',
    '∈':'\\in',      '∉':'\\notin',   '∋':'\\ni',      '⊂':'\\subset',
    '⊃':'\\supset',  '⊆':'\\subseteq','⊇':'\\supseteq','∅':'\\emptyset',
    '∪':'\\cup',     '∩':'\\cap',     '⊕':'\\oplus',   '⊗':'\\otimes',
    '→':'\\to',      '←':'\\leftarrow','↔':'\\leftrightarrow',
    '⇒':'\\Rightarrow','⇐':'\\Leftarrow','⇔':'\\Leftrightarrow',
    '↦':'\\mapsto',  '↗':'\\nearrow', '↘':'\\searrow',
    '⟨':'\\langle',  '⟩':'\\rangle',
    '⌊':'\\lfloor',  '⌋':'\\rfloor',  '⌈':'\\lceil',   '⌉':'\\rceil',
    '‖':'\\|',       '†':'\\dagger',  '‡':'\\ddagger',
    '∀':'\\forall',  '∃':'\\exists',  '∄':'\\nexists',
    '¬':'\\neg',     '∧':'\\wedge',   '∨':'\\vee',
    '⊢':'\\vdash',   '⊨':'\\models',  '⊥':'\\bot',     '⊤':'\\top',
    '℘':'\\wp',      'ℏ':'\\hbar',    'ℓ':'\\ell',     'ℜ':'\\Re',
    'ℑ':'\\Im',      'ℵ':'\\aleph',   'ℶ':'\\beth',
    '∼':'\\sim',     '≃':'\\simeq',   '≅':'\\cong',
    '⊞':'\\boxplus', '⊠':'\\boxtimes','⊡':'\\boxdot',
    '⋮':'\\vdots',   '⋯':'\\cdots',   '⋱':'\\ddots',   '⋰':'\\iddots',
    '′':'\'',        '″':'\'\'',
    // Physics operator hats (AI sometimes outputs these directly)
    'Ĥ':'\\hat{H}',  'Â':'\\hat{A}',  'B̂':'\\hat{B}',
    'p̂':'\\hat{p}',  'x̂':'\\hat{x}',  'ẑ':'\\hat{z}',
    'ρ̂':'\\hat{\\rho}', 'Ĵ':'\\hat{J}', 'L̂':'\\hat{L}',
    // Superscript operators
    '†':'\\dagger',   '‡':'\\ddagger',
    // Combining macron/bar used in physics
    'ā':'\\bar{a}',   'ē':'\\bar{e}',  'ō':'\\bar{o}',
    'ū':'\\bar{u}',   'ī':'\\bar{i}',
  };
  s = s.replace(/[∞∂∇√∑∏∫∮±∓×÷·∙≤≥≠≈≡≪≫∝∈∉∋⊂⊃⊆⊇∅∪∩⊕⊗→←↔⇒⇐⇔↦↗↘⟨⟩⌊⌋⌈⌉‖†‡∀∃∄¬∧∨⊢⊨⊥⊤℘ℏℓℜℑℵℶ∼≃≅⊞⊠⊡⋮⋯⋱⋰′″]/g,
    c => symMap[c] || c);

  // ── Environment normalization ─────────────────────────────────────────
  // 'gathered' → 'gather*'  (gathered is only valid inside align)
  s = s.replace(/\\begin\{gathered\}/g, '\\begin{gather*}')
       .replace(/\\end\{gathered\}/g,   '\\end{gather*}');
  // 'aligned' as standalone → 'align*'
  s = s.replace(/\\begin\{aligned\}/g, '\\begin{align*}')
       .replace(/\\end\{aligned\}/g,   '\\end{align*}');
  // 'alignedat' → 'alignat*'
  s = s.replace(/\\begin\{alignedat\}/g, '\\begin{alignat*}')
       .replace(/\\end\{alignedat\}/g,   '\\end{alignat*}');
  // 'eqnarray' / 'eqnarray*' → 'align*'  (eqnarray is deprecated, KaTeX refuses it)
  s = s.replace(/\\begin\{eqnarray\*?\}/g, '\\begin{align*}')
       .replace(/\\end\{eqnarray\*?\}/g,   '\\end{align*}');
  // 'subequations' wrapper → strip it (KaTeX has no equivalent)
  s = s.replace(/\\begin\{subequations\}|\\end\{subequations\}/g, '');
  // 'dcases' (mathtools) → 'cases'  — KaTeX 0.16 supports dcases natively, keep as fallback
  s = s.replace(/\\begin\{dcases\*?\}/g, '\\begin{cases}')
       .replace(/\\end\{dcases\*?\}/g,   '\\end{cases}');
  // 'multlined' → 'multline*'
  s = s.replace(/\\begin\{multlined\}/g, '\\begin{multline*}')
       .replace(/\\end\{multlined\}/g,   '\\end{multline*}');

  s = s.replace(/\\ +(?=[^\w\\{])/g, '\\\\ ');

  try {
    return katex.renderToString(s, display ? KATEX_OPTS_DISPLAY : KATEX_OPTS_INLINE);
  } catch(e) {
    // Fallback: show raw LaTeX in a styled span so user can see what failed
    const delim = display ? ['\\[', '\\]'] : ['\\(', '\\)'];
    return `<span class="katex-err" title="${esc(String(e))}">${esc(delim[0] + src + delim[1])}</span>`;
  }
}

function renderMarkdown(text) {
  if (!text || typeof text !== 'string') return '';

  // Two independent stores — CRITICAL separation:
  //   codeSaved  → restored BEFORE marked (so marked can syntax-highlight them)
  //   mathSaved  → restored AFTER  marked (KaTeX HTML must not pass through marked)
  const codeSaved = [];
  const mathSaved = [];

  // Sentinels use non-printable chars that marked will never touch
  const codeKey  = i => `\x01C${i}\x01`;   // \x01 = SOH — never in user text
  const mathKey  = i => `\x01M${i}\x01`;
  const escDollar = '\x01ESCD\x01';

  const saveCode = raw => { codeSaved.push(raw); return codeKey(codeSaved.length - 1); };
  const saveMath = html => { mathSaved.push(html); return mathKey(mathSaved.length - 1); };

  let s = text;

  // ── 0. Escaped dollar ────────────────────────────────────────────────
  s = s.replace(/\\\$/g, escDollar);

  // ── 1. Fenced + inline code (protect raw; marked will highlight them) ─
  s = s.replace(/(`{3,})([\s\S]*?)\1/g,  m => saveCode(m));   // fenced first
  s = s.replace(/`([^`\n]+)`/g,          m => saveCode(m));   // then inline

  // ── 2. Display math: $$...$$ ─────────────────────────────────────────
  s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, inner) =>
    saveMath(`<div class="math-display">${katexRender(inner.trim(), true)}</div>`)
  );

  // ── 3. Display math: \[...\] ─────────────────────────────────────────
  s = s.replace(/\\\[([\s\S]+?)\\\]/g, (_, inner) =>
    saveMath(`<div class="math-display">${katexRender(inner.trim(), true)}</div>`)
  );

  // ── 4. LaTeX environments \begin{env}...\end{env} ────────────────────
  s = s.replace(/\\begin\{([a-zA-Z*]+)\}([\s\S]*?)\\end\{\1\}/g, fullMatch =>
    saveMath(`<div class="math-display">${katexRender(fullMatch.trim(), true)}</div>`)
  );

  // ── 5. Inline math: \(...\) ──────────────────────────────────────────
  s = s.replace(/\\\(([\s\S]+?)\\\)/g, (_, inner) =>
    saveMath(katexRender(inner.trim(), false))
  );

  // ── 6. Inline math: $...$ ────────────────────────────────────────────
  s = s.replace(/(?<!\$)\$([^\s$\n][^$\n]*?[^\s$\n]|[^\s$\n])\$(?!\$)/g, (_, inner) =>
    saveMath(katexRender(inner.trim(), false))
  );

  // ── 6b. Bare LaTeX / Unicode math lines (no delimiters) ──────────────
  // Process line-by-line — much more reliable than a multi-line regex.
  //
  // A line is treated as a math expression if it meets ALL of:
  //   1. Not empty, not a Markdown structural line (#, >, |, -, *)
  //   2. Contains a math signal (LaTeX command OR math Unicode char)
  //   3. For equations: also contains a relation symbol (=, <, >, ≈, …)
  //   4. Doesn't look like natural-language prose
  //
  // Case B equation:  \hat{H} = -\frac{\hbar^2}{2m}\nabla^2 + V(r,t)
  // Case C lone cmd:  \hbar   \nabla^2   \psi_{100}
  // Case A unicode:   i ℏ ∂ψ/∂t = Ĥψ

  const _mathCmdRe  = /\\(?:frac|dfrac|tfrac|cfrac|sqrt|hat|tilde|bar|vec|dot|ddot|partial|nabla|hbar|infty|sum|prod|int|oint|iint|iiint|lim|sup|inf|max|min|log|ln|sin|cos|tan|cot|sec|csc|exp|det|ker|dim|deg|gcd|lcm|operatorname|mathbf|mathrm|mathbb|mathcal|mathfrak|boldsymbol|left|right|big|Big|bigg|Bigg|over|underbrace|overbrace|text|cdot|cdots|vdots|ddots|ldots|pm|mp|times|div|otimes|oplus|leq|geq|neq|approx|equiv|sim|propto|forall|exists|in|notin|subset|subseteq|cup|cap|to|rightarrow|leftarrow|Rightarrow|Leftarrow|iff|implies|psi|Psi|phi|Phi|alpha|beta|gamma|delta|epsilon|varepsilon|theta|vartheta|lambda|mu|nu|xi|pi|rho|sigma|tau|upsilon|omega|Gamma|Delta|Theta|Lambda|Xi|Pi|Sigma|Upsilon|Phi|Psi|Omega|chi|eta|iota|kappa|zeta|dagger|dag|circ|bullet|star|ast|prime|ell|Re|Im|wp|aleph|hslash|triangle|square|Box|nabla|angle|perp|parallel|vdash|models|top|bot|emptyset|varnothing|infty)\b/;
  const _mathUniRe  = /[∂∇∞∑∏∫∮±∓×÷·≤≥≠≈≡≪≫∝∈∉⊂⊃⊆⊇∅∪∩⊕⊗→←↔⇒⇐⇔ℏℓ℘ℜℑ⁰¹²³⁴⁵⁶⁷⁸⁹⁻⁺ₐₑₒₙₚₓ₀₁₂₃₄₅₆₇₈₉αβγδεζηθικλμνξπρστυφχψωΓΔΘΛΞΠΣΥΦΨΩ]/;
  const _relationRe = /[=<>≤≥≠≈≡∝~∼]/;
  // Prose signals: repeated punctuation OR common natural-language words
  const _proseRe    = /[，。！？；;、]{1,}[\u4e00-\u9fff]|[\u4e00-\u9fff][，。！？；;、]|\b(?:the|is|are|was|were|this|that|如果|因为|所以|当然|但是|需要|支持|渲染|说明|表示|包括|对于|其中|即|与|和|或|等|的|了|在|有|是|不|为|可|将|会|使|被|这|那|他|她|它|我|您|你|们)\b/i;

  {
    const srcLines = s.split('\n');
    const outLines = srcLines.map(rawLine => {
      const t = rawLine.trim();

      // Skip empty lines and Markdown structural markers
      if (!t) return rawLine;
      if (/^#{1,6}\s|^>\s|^\|.+\||^[-*+]\s|^\d+\.\s/.test(t)) return rawLine;
      // Skip lines that already contain our sentinels (already processed)
      if (t.includes('\x01')) return rawLine;
      // Skip lines with backticks (code)
      if (t.includes('`')) return rawLine;

      const hasCmd  = _mathCmdRe.test(t);
      const hasUni  = _mathUniRe.test(t);
      const hasRel  = _relationRe.test(t);
      const isProse = _proseRe.test(t);

      if (isProse) return rawLine;   // natural language — leave alone

      // Case B: LaTeX command(s) + relation → display equation
      if (hasCmd && hasRel) {
        return saveMath(`<div class="math-display">${katexRender(t, true)}</div>`);
      }
      // Case A: Unicode math chars + relation → display equation
      if (hasUni && hasRel) {
        return saveMath(`<div class="math-display">${katexRender(t, true)}</div>`);
      }
      // Case C: Line starts with \ and is purely LaTeX (no CJK, no prose words)
      if (hasCmd && t.startsWith('\\') && !/[\u4e00-\u9fff]/.test(t)) {
        // Only if the non-LaTeX parts look like math (digits, operators, parens)
        const nonLatex = t.replace(/\\[a-zA-Z]+|\{[^}]*\}|[_^{}\[\]().,\s\d+\-*/=<>|'`]/g, '');
        if (nonLatex.length < 5) {  // very little non-math residue
          return saveMath(katexRender(t, false));
        }
      }

      return rawLine;
    });
    s = outLines.join('\n');
  }


  s = s.replace(/\x01ESCD\x01/g, '$');
  s = s.replace(/\x01C(\d+)\x01/g, (_, i) => codeSaved[+i] ?? '');

  // ── 8. Run marked (sees only plain markdown + code blocks) ───────────
  let html = marked.parse(s);

  // ── 9. Restore math HTML (after marked, so it never touches it) ───────
  html = html.replace(/\x01M(\d+)\x01/g, (_, i) => mathSaved[+i] ?? '');

  // ── 10. Clean up empty <p> wrappers around display math ───────────────
  html = html.replace(/<p>\s*(<div class="math-display">[\s\S]*?<\/div>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

// ============================================================
//  ROBUST COPY  (file://, http://, https:// all supported)
// ============================================================
async function copyTextRobust(text) {
  // Tier 1: Modern Clipboard API (https + focused)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch { /* fall through */ }
  }
  // Tier 2: execCommand (file:// and old browsers)
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length); // iOS
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) return true;
  } catch { /* fall through */ }
  // Tier 3: Show a selectable modal so user can manually copy
  showCopyFallbackModal(text);
  return false;
}

// Minimal copy-fallback modal for iOS file:// edge cases

  const existing = document.getElementById('copy-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'copy-modal';
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);`;
  modal.innerHTML = `
    <div style="background:#fff;border-radius:18px;padding:20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);">
      <div style="font-size:14px;font-weight:600;color:#2d2926;margin-bottom:10px;">全选后复制 (Ctrl+C / ⌘C)</div>
      <textarea readonly style="width:100%;height:140px;font-size:13px;font-family:var(--mono);border:1px solid #e4dfd5;border-radius:10px;padding:10px;resize:none;color:#2d2926;background:#f5f2ec;outline:none;">${esc(text)}</textarea>
      <button onclick="document.getElementById('copy-modal').remove()" style="margin-top:12px;width:100%;padding:12px;background:#2d2926;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">关闭</button>
    </div>`;
  // Auto-select text
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
  requestAnimationFrame(() => {
    const ta = modal.querySelector('textarea');
    ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
  });
}

function triggerHaptic(type = 'light') {
  if (!navigator.vibrate) return;
  const patterns = { light: 8, medium: 18, heavy: 35, success: [8, 50, 8] };
  navigator.vibrate(patterns[type] || 10);
}

    document.getElementById('messages').addEventListener(evt, () => {
      if (timer) { clearTimeout(timer); timer = null; }
    }, { passive: true });
  });
})();
