function buildAssistantRow(initContent = '', initReasoning = '', isHistory = false) {
  const isReasoner = state.model === 'deepseek-reasoner' || !!initReasoning;
  const row = document.createElement('div');
  row.className = 'msg-row assistant';

  const avatar = document.createElement('div');
  avatar.className = 'assistant-avatar';
  avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;

  const col = document.createElement('div');
  col.className = 'assistant-content';

  let thinkRefs = null;
  if (isReasoner) {
    const block = document.createElement('div');
    // thinking = shimmer active; done = collapsed+done; open = expanded
    block.className = 'think-block' + (isHistory ? ' done' : ' thinking open');

    const header = document.createElement('div');
    header.className = 'think-header';
    header.addEventListener('click', () => block.classList.toggle('open'));

    // Icon placeholder
    const iconWrap = document.createElement('div');

    const labelEl = document.createElement('div');
    labelEl.className = 'think-label';

    const chevronSvg = document.createElement('svg');
    chevronSvg.classList.add('think-chevron');
    chevronSvg.setAttribute('viewBox','0 0 16 16');
    chevronSvg.setAttribute('width','13'); chevronSvg.setAttribute('height','13');
    chevronSvg.setAttribute('fill','currentColor');
    chevronSvg.innerHTML = '<path d="M8 10.5L3 5.5h10L8 10.5z"/>';

    if (isHistory) {
      // Done state
      iconWrap.className = 'think-icon-done';
      iconWrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      labelEl.innerHTML = `已思考<span class="think-label-secondary">完成</span>`;
    } else {
      // Thinking state — animated dots
      iconWrap.className = 'think-icon-thinking';
      iconWrap.innerHTML = `<span></span><span></span><span></span>`;
      labelEl.innerHTML = `深度思考中`;
      // Start a timer to show elapsed seconds
      const startTime = Date.now();
      const timer = setInterval(() => {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        if (sec > 0) labelEl.innerHTML = `深度思考中<span class="think-label-secondary">${sec}s</span>`;
        if (!block.classList.contains('thinking')) clearInterval(timer);
      }, 1000);
      block._thinkTimer = timer;
      block._thinkStart = startTime;
    }

    header.append(iconWrap, labelEl, chevronSvg);
    const body = document.createElement('div');
    body.className = 'think-body';
    const bodyInner = document.createElement('div');
    bodyInner.className = 'think-body-inner';
    const mdDiv = document.createElement('div');
    mdDiv.className = 'think-md';
    if (initReasoning) mdDiv.innerHTML = renderMarkdown(initReasoning);
    bodyInner.appendChild(mdDiv);
    body.appendChild(bodyInner);
    block.append(header, body);
    col.appendChild(block);
    thinkRefs = { block, iconWrap, labelEl, mdDiv, body };
  }

  const mdEl = document.createElement('div');
  mdEl.className = 'md-content';
  if (initContent) {
    mdEl.innerHTML = renderMarkdown(initContent);
  } else if (!isHistory) {
    mdEl.innerHTML = '<span class="cursor"></span>';
  }

  // Action buttons (desktop hover)
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = `
    <button class="msg-action-btn" title="复制" onclick="(async function(btn){
      const md = btn.closest('.assistant-content').querySelector('.md-content');
      if(!md) return;
      const ok = await navigator.clipboard.writeText(md.innerText).then(()=>true).catch(()=>false);
      if(ok){btn.classList.add('copied');btn.innerHTML='<svg width=13 height=13 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2.5\\' stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\'><polyline points=\\'20 6 9 17 4 12\\'/></svg>已复制';setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<svg width=13 height=13 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\' stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\'><rect x=\\'9\\' y=\\'9\\' width=\\'13\\' height=\\'13\\' rx=\\'2\\'/><path d=\\'M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1\\'/></svg>复制'},2000);}
    })(this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>复制
    </button>`;

  col.appendChild(mdEl);
  col.appendChild(actions);
  row.append(avatar, col);
  document.getElementById('messages').appendChild(row);
  scrollToBottom(false);
  return { mdEl, thinkRefs, row };
}

function renderErrorInRow(mdEl, message) {
  mdEl.innerHTML = `<div class="error-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${esc(message)}</div>`;
}

// ============================================================
//  SESSION MANAGEMENT
// ============================================================
function getSessionById(id) {
  return state.sessions.find(s => s.id === id) || null;
}

function createNewSession(switchNow = true) {
  // ── Guard: already on a pristine empty session ──────────────────────────
  if (switchNow) {
    const cur = getSessionById(state.currentSessionId);
    if (cur && cur.history.length === 0) {
      // Already on a blank new chat — just highlight & focus
      showToast('已在新对话，直接开始输入吧 ✨');
      const ta = document.getElementById('textarea');
      ta.focus();
      // Briefly flash the active item in sidebar for visual feedback
      const activeItem = document.querySelector('.session-item.active');
      if (activeItem) {
        activeItem.classList.add('flash');
        setTimeout(() => activeItem.classList.remove('flash'), 600);
      }
      if (window.innerWidth <= 768) toggleSidebar(false);
      return;
    }
  }
  // ── Normal: create fresh session ────────────────────────────────────────
  if (state.isStreaming) stopStream();
  const newId = genId();
  const newSession = {
    id: newId,
    title: '新对话',
    model: state.model,
    history: [],
    updatedAt: Date.now(),
    createdAt: Date.now(),
  };
  state.sessions.unshift(newSession);
  StorageManager.saveSessions();
  if (switchNow) switchSession(newId);
  else renderSessionList();
}

function switchSession(id) {
  if (state.isStreaming && state.streamingSessionId !== id) stopStream();
  const session = getSessionById(id);
  if (!session) {
    // Session not found — fallback to first available
    if (state.sessions.length > 0) switchSession(state.sessions[0].id);
    else createNewSession(true);
    return;
  }
  state.currentSessionId = id;

  // Restore the model for this session
  const modelEl = document.querySelector(`.model-option[data-model="${session.model}"]`);
  if (modelEl) selectModel(modelEl, false);

  // Render messages
  const msgContainer = document.getElementById('messages');
  msgContainer.innerHTML = '';

  if (session.history.length === 0) {
    renderWelcome();
  } else {
    // Render validated history
    session.history.forEach(m => {
      if (m.role === 'user') {
        buildUserRow(m.content);
      } else if (m.role === 'assistant') {
        buildAssistantRow(m.content, m.reasoning || '', true);
      }
    });
    requestAnimationFrame(() => {
      requestAnimationFrame(() => scrollToBottom(false));
    });
  }

  StorageManager.saveSessions();
  renderSessionList();
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function deleteSession(e, id) {
  e.stopPropagation();
  if (state.isStreaming && state.streamingSessionId === id) stopStream();
  state.sessions = state.sessions.filter(s => s.id !== id);
  if (state.sessions.length === 0) {
    createNewSession(true);
  } else if (state.currentSessionId === id) {
    switchSession(state.sessions[0].id);
  } else {
    StorageManager.saveSessions();
    renderSessionList();
  }
}

function updateSessionTitleIfNew(text) {
  const session = getSessionById(state.currentSessionId);
  if (session && session.history.length === 1 && session.title === '新对话') {
    session.title = text.slice(0, 20) + (text.length > 20 ? '…' : '');
    renderSessionList();
  }
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';

  // Sort by updated time (newest first) and group
  const sorted = [...state.sessions].sort((a, b) => b.updatedAt - a.updatedAt);
  let lastGroup = null;

  sorted.forEach(s => {
    const group = formatRelativeDate(s.updatedAt);
    if (group !== lastGroup) {
      const label = document.createElement('div');
      label.className = 'session-group-label';
      label.textContent = group;
      list.appendChild(label);
      lastGroup = group;
    }

    const el = document.createElement('div');
    el.className = `session-item ${s.id === state.currentSessionId ? 'active' : ''}`;
    el.onclick = () => switchSession(s.id);

    const inner = document.createElement('div');
    inner.className = 'session-item-inner';
    const titleEl = document.createElement('div');
    titleEl.className = 'session-title';
    titleEl.textContent = s.title;
    inner.appendChild(titleEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'delete-session-btn';
    delBtn.title = '删除';
    delBtn.onclick = (e) => deleteSession(e, s.id);
    delBtn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`;

    el.append(inner, delBtn);
    list.appendChild(el);
  });
}

// ============================================================
//  SEND MESSAGE + STREAMING
// ============================================================
async function sendMessage() {
  if (state.isStreaming) return;
  const ta = document.getElementById('textarea');
  const text = ta.value.trim();
  if (!text) return;

  if (!state.apiKey) {
    openSettings();
    showToast('请先设置 API Key');
    return;
  }

  const session = getSessionById(state.currentSessionId);
  if (!session) { showToast('无效的对话，请新建对话'); return; }

  ta.value = '';
  handleInput();
  triggerHaptic('light');
  const messagesToSend = [];
  if (state.systemPrompt) messagesToSend.push({ role: 'system', content: state.systemPrompt });

  let historyToSend = session.history;
  if (state.enableSliding && state.maxContextSize > 0) {
    historyToSend = session.history.slice(-state.maxContextSize);
  }
  historyToSend.forEach(m => messagesToSend.push({ role: m.role, content: m.content }));
  messagesToSend.push({ role: 'user', content: text });

  // Add user message to state immediately
  session.history.push({ role: 'user', content: text, reasoning: '' });
  session.updatedAt = Date.now();
  updateSessionTitleIfNew(text);
  StorageManager.saveSessions();

  buildUserRow(text);
  const refs = buildAssistantRow('', '', false);
  setUI(true);
  // Re-focus for quick follow-up (desktop); on mobile keyboard stays up naturally
  if (window.innerWidth > 768) document.getElementById('textarea').focus();
  await stream(refs, messagesToSend, session);
  setUI(false);
}

function setUI(streaming) {
  state.isStreaming = streaming;
  const btn = document.getElementById('send-btn');
  btn.disabled = streaming;
  btn.classList.toggle('empty', streaming || !document.getElementById('textarea').value.trim());
  document.getElementById('stop-btn').classList.toggle('visible', streaming);
}

function stopStream() {
  state.abortController?.abort();
}

async function stream({ mdEl, thinkRefs, row }, messagesToSend, session) {
  state.abortController = new AbortController();
  state.streamingSessionId = session.id;

  let thinking = '', answer = '', thinkDone = false;
  const t0 = Date.now();
  let renderTimer = null, lastRenderTime = 0;

  const updateDOM = () => {
    // Guard: check session still exists (might have been deleted)
    if (!getSessionById(session.id)) return;

    if (thinking && thinkRefs) {
      thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
      scheduleTypeset(thinkRefs.mdDiv);
      if (thinkRefs.block.classList.contains('open') && !isUserScrolledUp) {
        thinkRefs.body.scrollTop = thinkRefs.body.scrollHeight;
      }
    }
    if (answer) {
      mdEl.innerHTML = renderMarkdown(answer) + '<span class="cursor"></span>';
      scheduleTypeset(mdEl);
    }
    scrollToBottom(false);
  };

  const scheduleRender = () => {
    const now = Date.now();
    if (now - lastRenderTime > 80) {
      updateDOM();
      lastRenderTime = now;
    } else if (!renderTimer) {
      renderTimer = setTimeout(() => {
        updateDOM();
        lastRenderTime = Date.now();
        renderTimer = null;
      }, 80);
    }
  };

  try {
    const res = await fetch(`${state.baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.apiKey}`,
      },
      body: JSON.stringify({
        model: state.model,
        messages: messagesToSend,
        stream: true,
        max_tokens: 8192,
      }),
      signal: state.abortController.signal,
    });

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try { const errJson = await res.json(); errMsg = errJson.error?.message || errMsg; } catch {}
      throw new Error(errMsg);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line in buffer
      for (const line of lines) {
        const t = line.trim();
        if (!t || t === 'data: [DONE]') continue;
        if (!t.startsWith('data: ')) continue;
        let json;
        try { json = JSON.parse(t.slice(6)); } catch { continue; }
        const delta = json.choices?.[0]?.delta;
        if (!delta) continue;
        if (delta.reasoning_content && thinkRefs) {
          thinking += delta.reasoning_content;
          scheduleRender();
        }
        if (delta.content) {
          if (!thinkDone && thinkRefs) {
            thinkDone = true;
            const secs = Math.round((Date.now() - t0) / 1000);
            // Clear the interval timer
            if (thinkRefs.block._thinkTimer) {
              clearInterval(thinkRefs.block._thinkTimer);
              thinkRefs.block._thinkTimer = null;
            }
            // Swap to done state
            thinkRefs.block.classList.remove('thinking');
            thinkRefs.block.classList.add('done');
            thinkRefs.block.classList.remove('open');
            // Swap icon: animated dots → checkmark circle
            thinkRefs.iconWrap.className = 'think-icon-done';
            thinkRefs.iconWrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            thinkRefs.labelEl.innerHTML = `已思考<span class="think-label-secondary">${secs} 秒</span>`;
            thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
            typesetElement(thinkRefs.mdDiv);
          }
          answer += delta.content;
          scheduleRender();
        }
      }
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      // User stopped — partial content is fine, handled in finally
    } else {
      renderErrorInRow(mdEl, `请求失败：${err.message}`);
      showToast('请求失败，请检查网络和 API Key');
      // Roll back the user message we added
      const lastIdx = session.history.length - 1;
      if (session.history[lastIdx]?.role === 'user') {
        session.history.pop();
        StorageManager.saveSessions();
      }
      return; // skip saving assistant message
    }
  } finally {
    if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }

    // Final render — remove cursor, set complete HTML (KaTeX already rendered inline)
    if (answer) {
      mdEl.innerHTML = renderMarkdown(answer);
    }
    mdEl.querySelector('.cursor')?.remove();

    // Fix think block state on abort/no-answer
    if (thinkRefs && !thinkDone) {
      if (thinkRefs.block._thinkTimer) {
        clearInterval(thinkRefs.block._thinkTimer);
        thinkRefs.block._thinkTimer = null;
      }
      thinkRefs.block.classList.remove('thinking');
      thinkRefs.block.classList.add('done');
      thinkRefs.iconWrap.className = 'think-icon-done';
      thinkRefs.iconWrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      thinkRefs.labelEl.innerHTML = thinking
        ? `思考已中止<span class="think-label-secondary">已展开</span>`
        : `思考中断`;
      if (thinking) thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
    }

    // Save assistant message if there's content
    if ((answer || thinking) && getSessionById(session.id)) {
      session.history.push({ role: 'assistant', content: answer, reasoning: thinking });
      session.updatedAt = Date.now();
      StorageManager.saveSessions();
      renderSessionList();
    }

    state.abortController = null;
    state.streamingSessionId = null;
    scrollToBottom(true);
  }
}

// ============================================================
//  SETTINGS
// ============================================================
function openSettings() {
  document.getElementById('api-key-input').value = state.apiKey;
  document.getElementById('base-url-input').value =
    state.baseUrl === 'https://api.deepseek.com' ? '' : state.baseUrl;
  document.getElementById('system-prompt-input').value = state.systemPrompt;
  document.getElementById('sliding-context-input').checked = state.enableSliding;
  document.getElementById('max-context-input').value = state.maxContextSize;
  toggleContextSizeUI();

  // Show storage info
  updateStorageInfo();

  document.getElementById('settings-overlay').classList.add('open');
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target.id === 'settings-overlay') closeSettings();
}

function toggleContextSizeUI() {
  const enabled = document.getElementById('sliding-context-input').checked;
  document.getElementById('max-context-wrap').classList.toggle('hidden', !enabled);
}

function saveSettings() {
  state.apiKey = document.getElementById('api-key-input').value.trim();
  const bu = document.getElementById('base-url-input').value.trim();
  state.baseUrl = bu || 'https://api.deepseek.com';
  state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
  state.enableSliding = document.getElementById('sliding-context-input').checked;
  state.maxContextSize = parseInt(document.getElementById('max-context-input').value, 10) || 20;
  StorageManager.saveConfig({
    apiKey: state.apiKey, baseUrl: state.baseUrl,
    systemPrompt: state.systemPrompt, enableSliding: state.enableSliding,
    maxContextSize: state.maxContextSize,
  });
  closeSettings();
  showToast('✓ 设置已保存');
}

function updateStorageInfo() {
  const bytes = StorageManager.getUsageBytes();
  const kb = (bytes / 1024).toFixed(1);
  const pct = Math.min(100, (bytes / (5 * 1024 * 1024)) * 100).toFixed(0);
  document.getElementById('storage-info-text').innerHTML =
    `已使用约 <strong>${kb} KB</strong>，共 <strong>${state.sessions.length}</strong> 个对话，约占本地存储上限的 <strong>${pct}%</strong>。`;
  document.getElementById('storage-warning').classList.toggle('visible', bytes >= STORAGE_WARN_BYTES);
}

function trimOldSessions() {
  const thirtyDaysAgo = Date.now() - 30 * 86400000;
  const before = state.sessions.length;
  state.sessions = state.sessions.filter(s =>
    s.id === state.currentSessionId || s.updatedAt > thirtyDaysAgo
  );
  const removed = before - state.sessions.length;
  StorageManager.saveSessions();
  renderSessionList();
  updateStorageInfo();
  showToast(removed > 0 ? `✓ 已清理 ${removed} 个旧对话` : '没有超过30天的旧对话');
}

// ============================================================
//  MODEL SELECTOR
// ============================================================
function toggleModelDropdown() {
  const open = document.getElementById('model-dropdown').classList.toggle('open');
  document.getElementById('model-btn').classList.toggle('open', open);
  if (open) setTimeout(() => document.addEventListener('click', outsideModelClose, true), 0);
}

function outsideModelClose(e) {
  if (!document.getElementById('model-selector-wrap').contains(e.target)) {
    document.getElementById('model-dropdown').classList.remove('open');
    document.getElementById('model-btn').classList.remove('open');
    document.removeEventListener('click', outsideModelClose, true);
  }
}

function selectModel(el, save = true) {
  if (!el) return;
  state.model = el.dataset.model;
  document.querySelectorAll('.model-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('check-deepseek-chat').style.display = 'none';
  document.getElementById('check-deepseek-reasoner').style.display = 'none';
  const checkEl = document.getElementById('check-' + state.model);
  if (checkEl) checkEl.style.display = 'inline';
  const labels = { 'deepseek-chat': 'DeepSeek V3', 'deepseek-reasoner': 'DeepSeek R1' };
  document.getElementById('model-label').textContent = labels[state.model] || state.model;
  document.getElementById('model-dropdown').classList.remove('open');
  document.getElementById('model-btn').classList.remove('open');
  document.removeEventListener('click', outsideModelClose, true);
  if (save && state.currentSessionId) {
    const s = getSessionById(state.currentSessionId);
    if (s) { s.model = state.model; StorageManager.saveSessions(); }
  }
}

// ============================================================
//  SIDEBAR
// ============================================================
function toggleSidebar(forceOpen) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.contains('open');
  if (forceOpen === true || !isOpen) {
    sb.classList.add('open');
    ov.classList.add('open');
  } else {
    sb.classList.remove('open');
    ov.classList.remove('open');
  }
}

// ── Swipe-right-from-edge to open sidebar (mobile) ───────────────
;(function() {
  if (window.innerWidth > 768) return;
  let sx = 0, sy = 0, tracking = false;
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY; tracking = sx < 24;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dx = e.touches[0].clientX - sx;
    const dy = Math.abs(e.touches[0].clientY - sy);
    if (dx > 48 && dy < 60) toggleSidebar(true);
  }, { passive: true });
  document.addEventListener('touchend', () => { tracking = false; }, { passive: true });
})();

// ── Tap input area to smoothly re-scroll to bottom on keyboard open ─
document.getElementById('textarea').addEventListener('focus', () => {
  setTimeout(() => scrollToBottom(false), 320);
}, { passive: true });

// ============================================================
function exportData() {
  const data = {
    version: 3,
    config: StorageManager.loadConfig(),
    sessions: state.sessions,
    activeId: state.currentSessionId,
    exportDate: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `DeepSeek-Backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 导出成功');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (data.config) StorageManager.saveConfig(data.config);
      if (Array.isArray(data.sessions)) {
        state.sessions = data.sessions;
        StorageManager.saveSessions();
      }
      if (data.activeId) localStorage.setItem(ACTIVE_ID_KEY, data.activeId);
      showToast('✓ 导入成功，正在刷新…');
      setTimeout(() => location.reload(), 900);
    } catch {
      showToast('❌ 解析失败：无效的备份文件');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
//  TOAST
// ============================================================
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
//  INITIALIZATION
// ============================================================
(function init() {
  // 1. Migrate old data formats
  StorageManager.migrate();

  // 2. Load config
  const cfg = StorageManager.loadConfig();
  state.apiKey        = cfg.apiKey        || '';
  state.baseUrl       = cfg.baseUrl       || 'https://api.deepseek.com';
  state.systemPrompt  = cfg.systemPrompt  || '';
  state.enableSliding = cfg.enableSliding !== false;
  state.maxContextSize= cfg.maxContextSize || 20;

  // 3. Load and validate sessions
  state.sessions = StorageManager.loadSessions();

  // 4. Determine active session
  const activeId = StorageManager.getActiveId();

  if (state.sessions.length === 0) {
    createNewSession(false);
    switchSession(state.sessions[0].id);
  } else {
    const target = state.sessions.find(s => s.id === activeId) || state.sessions[0];
    switchSession(target.id);
  }

  // 5. Focus input
  document.getElementById('textarea').focus();
})();

// ============================================================
//  PWA: page visibility — re-check scroll on return to foreground
// ============================================================
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !isUserScrolledUp) {
    scrollToBottom(false);
  }
});

// Save on page hide (PWA background)
window.addEventListener('pagehide', () => {
  StorageManager.saveSessions();
});

// ============================================================
//  PWA: SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('✓ Service Worker 已注册', reg.scope);
        // Force update check
        reg.update().catch(() => {});
      })
      .catch(err => console.warn('⚠ Service Worker 注册失败', err));
  });
}
</script>
