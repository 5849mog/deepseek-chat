<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DeepSeek Chat</title>
  
  <!-- === PWA 与移动端增强标签 开始 === -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdfbf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DeepSeek">
  <link rel="apple-touch-icon" href="icon.svg">
  <!-- === PWA 标签 结束 === -->

  <!-- 字体与基础样式 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  
  <!-- Markdown解析 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  
  <!-- Math公式渲染 (KaTeX核心) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <style>
    /* （此处保留你原有的全部 CSS，未做任何更改，为节省篇幅略过重复内容...）*/
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #fdfbf7; 
      --bg2:          #f5f2ec;
      --bg3:          #ebe6dd;
      --sidebar-bg:   #f4f0ea;
      --sidebar-hover:#e8e3db;
      --sidebar-act:  #dfd9ce;
      --border:       #e4dfd5;
      --border2:      #d1caba;
      --text:         #2d2926;
      --text2:        #5c5750;
      --text3:        #9e978e;
      --user-bg:      #eee9df;
      --user-border:  #e2dcd0;
      --accent:       #d97743;
      --accent2:      #b85c2b;
      --think-bg:     #f8f6f1;
      --think-border: #dcd6cb;
      --think-text:   #827b72;
      --code-bg:      #f4f1eb;
      --shadow-sm:    0 1px 2px rgba(0,0,0,.04);
      --shadow:       0 2px 6px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:    0 6px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
      --font:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', 'Fira Code', monospace;
      --header-h: 56px;
      --sidebar-w: 260px;
    }
    html, body { height:100%; width:100%; overflow:hidden; font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
    #root-layout { display: flex; height: 100dvh; width: 100%; position: relative; }
    /* ... 紧接原有剩余 CSS ... */
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; }
    .sidebar-header { padding: 16px 16px 8px; flex-shrink: 0; }
    .new-chat-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm); }
    .new-chat-btn:hover { background: #fff; border-color: var(--border2); }
    .new-chat-btn svg { width: 16px; height: 16px; color: var(--text2); }
    #session-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
    #session-list::-webkit-scrollbar { width: 4px; }
    #session-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 2px; }
    #session-list:hover::-webkit-scrollbar-thumb { background: var(--border2); }
    .session-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; color: var(--text2); group; }
    .session-item:hover { background: var(--sidebar-hover); color: var(--text); }
    .session-item.active { background: var(--sidebar-act); color: var(--text); font-weight: 500; }
    .session-title { flex: 1; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
    .delete-session-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--text3); border-radius: 4px; cursor: pointer; opacity: 0; transition: all 0.15s; }
    .session-item:hover .delete-session-btn { opacity: 1; }
    .delete-session-btn:hover { background: rgba(0,0,0,.08); color: #d93025; }
    .sidebar-footer { padding: 12px 16px 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
    .tool-btn { display: flex; align-items: center; gap: 10px; width: 100%; background: transparent; border: none; padding: 10px 12px; border-radius: 8px; font-family: var(--font); font-size: 13.5px; font-weight: 500; color: var(--text2); cursor: pointer; transition: background 0.1s; text-align: left; }
    .tool-btn:hover { background: var(--sidebar-hover); color: var(--text); }
    .tool-btn svg { width: 16px; height: 16px; }
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.2); backdrop-filter: blur(2px); z-index: 199; opacity: 0; transition: opacity 0.3s; }
    #app { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    #header { position: sticky; top: 0; z-index: 100; height: var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: rgba(253, 251, 247, 0.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #header-left { display: flex; align-items: center; gap: 10px; }
    .menu-toggle { display: none; width: 34px; height: 34px; border: none; background: transparent; border-radius: 8px; color: var(--text2); cursor: pointer; align-items: center; justify-content: center; }
    .menu-toggle:hover { background: var(--bg2); }
    #logo { width: 26px; height: 26px; background: linear-gradient(135deg,#e38959,#c96b3a); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #logo svg { width: 14px; height: 14px; }
    #model-selector-wrap { position:relative; }
    #model-btn { display:flex; align-items:center; gap:6px; padding:6px 10px 6px 12px; background:transparent; border:1px solid transparent; border-radius:20px; font-family:var(--font); font-size:14px; font-weight:600; color:var(--text); cursor:pointer; transition:all .15s; white-space:nowrap; }
    #model-btn:hover { background:var(--bg2); border-color:var(--border); }
    #model-btn .chevron { transition:transform .2s; }
    #model-btn.open .chevron { transform:rotate(180deg); }
    #model-dropdown { display:none; position:absolute; top:calc(100% + 6px); left:0; min-width:230px; background:var(--bg); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-md); overflow:hidden; z-index:200; animation:dropIn .18s ease; }
    #model-dropdown.open { display:block; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-6px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .model-option { padding:12px 14px; cursor:pointer; display:flex; flex-direction:column; gap:2px; border-bottom:1px solid var(--border); transition:background .1s; }
    .model-option:last-child { border-bottom:none; }
    .model-option:hover, .model-option.selected { background:var(--bg2); }
    .model-option-name { font-size:13.5px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:6px; }
    .model-option-desc { font-size:11.5px; color:var(--text3); }
    .think-badge { font-size:9px; font-weight:600; letter-spacing:.04em; padding:1px 5px; border-radius:4px; background:linear-gradient(135deg,#9168e2,#6b44d4); color:#fff; }
    .checkmark { color:var(--accent); font-size:13px; margin-left:auto; }
    #header-right { display: flex; align-items: center; gap: 8px; }
    #messages-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scroll-behavior: smooth; display: flex; justify-content: center; }
    #messages-wrap::-webkit-scrollbar { width: 4px; }
    #messages-wrap::-webkit-scrollbar-track { background: transparent; }
    #messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    #messages { width: 100%; max-width: 840px; padding: 24px 16px 40px; display: flex; flex-direction: column; gap: 24px; }
    .msg-row { display:flex; animation:fadeUp .28s ease; width: 100%; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.user .bubble { max-width: 85%; background: var(--user-bg); border: 1px solid var(--user-border); border-radius: 20px 20px 4px 20px; padding: 12px 16px; font-size: 15px; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; }
    .msg-row.assistant { justify-content: flex-start; gap: 14px; align-items: flex-start; }
    .assistant-avatar { width: 30px; height: 30px; flex-shrink: 0; margin-top: 2px; background: linear-gradient(135deg,#e38959,#c96b3a); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .assistant-avatar svg { width: 16px; height: 16px; }
    .assistant-content { flex: 1; min-width: 0; max-width: calc(100% - 44px); display: flex; flex-direction: column; gap: 10px; }
    .think-block { border: 1px solid var(--think-border); border-radius: 14px; background: var(--think-bg); overflow: hidden; }
    .think-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; user-select: none; }
    .think-spinner { width: 14px; height: 14px; flex-shrink: 0; border: 2px solid var(--think-border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .think-done-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--text3); display: flex; }
    .think-done-icon svg { width: 14px; height: 14px; }
    .think-label { flex: 1; font-size: 13px; font-weight: 500; color: var(--think-text); display: flex; align-items: center; gap: 6px; }
    .think-dots span { display: inline-block; width: 3px; height: 3px; background: var(--think-text); border-radius: 50%; animation: dotPulse 1.4s ease infinite; }
    .think-dots span:nth-child(2){animation-delay:.2s}
    .think-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }
    .think-chevron { color: var(--text3); transition: transform .22s ease; flex-shrink: 0; }
    .think-body { overflow: hidden; max-height: 0; transition: max-height .32s cubic-bezier(.4,0,.2,1), padding .22s; padding: 0 14px; }
    .think-block.open .think-body { max-height: 1200px; overflow-y: auto; padding: 0 14px 14px; }
    .think-block.open .think-chevron { transform: rotate(180deg); }
    .think-body::-webkit-scrollbar { width: 3px; }
    .think-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .think-md { font-size: 13.5px; line-height: 1.65; color: var(--think-text); word-break: break-word; }
    .think-md p { margin-bottom: 8px; }
    .think-md p:last-child { margin-bottom: 0; }
    .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 2px; margin: 12px 0; }
    .katex-mathml { display: none !important; }
    .md-content { font-size: 15.5px; line-height: 1.7; color: var(--text); word-break: break-word; }
    .md-content p { margin-bottom: 14px; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content h1,.md-content h2,.md-content h3,.md-content h4 { font-weight: 600; margin: 20px 0 10px; line-height: 1.3; color: #111; }
    .md-content h1{font-size:20px} .md-content h2{font-size:18px} .md-content h3{font-size:16px}
    .md-content ul,.md-content ol { padding-left: 24px; margin-bottom: 14px; }
    .md-content li { margin-bottom: 4px; }
    .md-content blockquote { border-left: 3px solid var(--border2); padding: 8px 14px; margin: 12px 0; color: var(--text2); font-style: italic; background: var(--bg2); border-radius: 0 8px 8px 0; }
    .md-content code:not(pre code) { font-family: var(--mono); font-size: 13.5px; background: var(--code-bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; color: var(--accent2); }
    .md-content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 14px 0; }
    .code-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); }
    .code-lang { font-family: var(--mono); font-size: 11.5px; font-weight: 600; color: var(--text2); }
    .copy-btn { font-family: var(--font); font-size: 11.5px; font-weight: 600; color: var(--text3); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; transition: all .15s; }
    .copy-btn:hover { background: var(--bg2); color: var(--text2); }
    .copy-btn.copied { color: var(--accent); }
    .md-content pre code { font-family: var(--mono); font-size: 13px; display: block; padding: 14px 16px; overflow-x: auto; background: none !important; line-height: 1.6; }
    .md-content table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 14px 0; display: block; overflow-x: auto; }
    .md-content th,.md-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .md-content th { background: var(--bg2); font-weight: 600; }
    .md-content a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--text); vertical-align: text-bottom; animation: blink .9s step-start infinite; border-radius: 1px; margin-left: 2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px 40px; text-align: center; gap: 16px; min-height: calc(100dvh - var(--header-h) - 100px); }
    #welcome-logo { width: 64px; height: 64px; background: linear-gradient(135deg,#e38959,#c96b3a); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(201,107,58,.25); }
    #welcome-logo svg { width: 32px; height: 32px; }
    #welcome h1 { font-size: 24px; font-weight: 600; color: var(--text); margin-top: 4px; }
    #welcome p { font-size: 15px; color: var(--text3); line-height: 1.6; max-width: 300px; }
    .welcome-chips { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; margin-top: 12px; }
    .chip { padding: 12px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; font-size: 14px; color: var(--text2); cursor: pointer; text-align: left; transition: all .15s; font-family: var(--font); box-shadow: var(--shadow-sm); }
    .chip:hover { background: #fff; border-color: var(--border2); color: var(--text); transform: translateY(-1px); box-shadow: var(--shadow); }
    #input-area { flex-shrink: 0; padding: 0 16px 16px; background: var(--bg); display: flex; justify-content: center; }
    #input-bar { width: 100%; max-width: 840px; display: flex; align-items: flex-end; gap: 8px; background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 8px 8px 8px 16px; transition: border-color .15s, box-shadow .15s; box-shadow: var(--shadow); }
    #input-bar:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(201,107,58,.1), var(--shadow); }
    #textarea { flex: 1; font-family: var(--font); font-size: 15.5px; line-height: 1.5; color: var(--text); background: transparent; border: none; outline: none; resize: none; min-height: 24px; max-height: 160px; padding: 6px 0; overflow-y: auto; }
    #textarea::placeholder { color: var(--text3); }
    #send-btn { width: 36px; height: 36px; flex-shrink: 0; border: none; background: var(--text); color: #fff; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    #send-btn:hover:not(:disabled){background: #000; transform: scale(1.03)}
    #send-btn:active:not(:disabled){transform: scale(.97)}
    #send-btn:disabled { background: var(--bg3); cursor: not-allowed; }
    #send-btn.empty:not(:disabled) { background: var(--bg2); color: var(--text3); cursor: default; transform: none; }
    #send-btn svg { width: 16px; height: 16px; }
    #stop-btn { width: 36px; height: 36px; flex-shrink: 0; border: 1.5px solid var(--border2); background: transparent; color: var(--text2); border-radius: 14px; cursor: pointer; display: none; align-items: center; justify-content: center; transition: all .15s; }
    #stop-btn.visible { display: flex; }
    #stop-btn:hover { background: var(--bg2); color: var(--text); }
    #stop-btn svg { width: 14px; height: 14px; }
    #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(2px); z-index: 300; opacity: 0; transition: opacity 0.2s; }
    #settings-overlay.open { display: flex; align-items: flex-end; justify-content: center; opacity: 1; }
    #settings-sheet { width: 100%; max-width: 520px; background: var(--bg); border-radius: 20px 20px 0 0; padding: 16px 20px 30px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); display: flex; flex-direction: column; max-height: 90dvh; box-shadow: 0 -4px 20px rgba(0,0,0,.1); }
    #settings-overlay.open #settings-sheet { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
    .sheet-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .settings-scroll-area { overflow-y: auto; overflow-x: hidden; margin: 0 -20px; padding: 0 20px 20px; flex: 1; }
    .settings-scroll-area::-webkit-scrollbar { width: 4px; }
    .settings-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .setting-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .card-title { font-size: 14.5px; font-weight: 600; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: .02em; margin-bottom: 6px; display: block; }
    .field-input { width: 100%; font-family: var(--mono); font-size: 13.5px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; transition: all .15s; margin-bottom: 6px; }
    .field-input:focus { border-color: var(--border2); background: #fff; box-shadow: 0 0 0 3px rgba(201,107,58,.08); }
    .field-hint { font-size: 11.5px; color: var(--text3); line-height: 1.5; margin-bottom: 14px; }
    .field-hint:last-child { margin-bottom: 0; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 6px; border-top: 1px solid var(--border); margin-top: 12px; }
    .toggle-info { flex: 1; padding-right: 16px; }
    .toggle-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .toggle-desc { font-size: 11.5px; color: var(--text3); margin-top: 4px; line-height: 1.4; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border2); transition: .25s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .25s cubic-bezier(.4,0,.2,1); border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); }
    #max-context-wrap { margin-top: 12px; padding-top: 14px; border-top: 1px dashed var(--border); overflow: hidden; transition: all .25s ease; }
    #max-context-wrap.hidden { display: none; }
    .save-btn { width: 100%; padding: 14px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; margin-top: 6px; flex-shrink: 0; }
    .save-btn:hover { background: #000; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(1px); }
    #scroll-down { position:fixed; bottom:90px; right:16px; width:36px; height:36px; background:var(--bg); border:1px solid var(--border2); border-radius:50%; box-shadow:var(--shadow-md); display:none; align-items:center; justify-content:center; cursor:pointer; z-index:50; color:var(--text2); transition:all .2s; }
    #scroll-down.visible { display:flex; }
    #scroll-down:hover { background:var(--bg2); }
    #scroll-down svg { width:16px; height:16px; }
    #toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; font-size:13.5px; font-weight:500; padding:10px 20px; border-radius:24px; opacity:0; pointer-events:none; transition:all .3s cubic-bezier(0.2,0.8,0.2,1); z-index:500; white-space:nowrap; box-shadow: var(--shadow-md); }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .hljs { background:transparent !important; padding:0 !important; }

<script>

function renderMarkdown(text) {

  });
  processed = processed.replace(/\$([^\s$][^$\n]*?[^\s$]|[^\s$])\$|\\\(([\s\S]+?)\\\)/g, (match, p1, p2) => {

}
const myRenderer = new marked.Renderer();
myRenderer.code = (code, lang) => {

};
marked.use({ renderer: myRenderer, breaks: true, gfm: true });
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('messages').addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn'); if (!btn) return;
  const code = document.getElementById(btn.dataset.target); if (!code) return;

    const orig = btn.innerHTML; btn.textContent = '✓ 已复制'; btn.classList.add('copied');

});
(function init() {
  try {
    const s = JSON.parse(localStorage.getItem(CFG_KEY) || '{}');
    state.apiKey = s.apiKey || ''; state.baseUrl = s.baseUrl || 'https://api.deepseek.com';
    state.systemPrompt = s.systemPrompt || ''; state.enableSliding = s.enableSliding !== false;
    state.maxContextSize = s.maxContextSize || 20;
  } catch {}
  const oldSession = JSON.parse(localStorage.getItem('ds_chat_session'));

    const history = oldSession.history || [];
    state.sessions =[{ id: genId(), title: history.length > 0 ? history[0].content.slice(0, 15) : '新对话', model: oldSession.model || 'deepseek-chat', history: history, updatedAt: Date.now() }];
    localStorage.removeItem('ds_chat_session');
  } else { try { state.sessions = JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch {} }

  if (state.sessions.length === 0) { createNewSession(false); } else {
    const target = state.sessions.find(s => s.id === activeId) || state.sessions[0];

})();
function toggleSidebar(forceOpen) {
  const sb = document.getElementById('sidebar'); const ov = document.getElementById('sidebar-overlay');

}

}

function exportData() {
  const data = { config: JSON.parse(localStorage.getItem(CFG_KEY) || '{}'), sessions: state.sessions, activeId: state.currentSessionId, exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'}); const url = URL.createObjectURL(blob);

}
function triggerImport() { document.getElementById('import-file').click(); }

}

  if (isReasoner) {
    const block = document.createElement('div'); block.className = 'think-block ' + (isHistory ? '' : 'open');
    const header = document.createElement('div'); header.className = 'think-header'; header.addEventListener('click', () => block.classList.toggle('open'));
    const spinner = document.createElement('div'); spinner.className = 'think-spinner';
    const labelEl = document.createElement('div'); labelEl.className = 'think-label';
    if (isHistory) { spinner.className = 'think-done-icon'; spinner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`; labelEl.innerHTML = `已思考`; } 
    else { labelEl.innerHTML = `正在深度思考<div class="think-dots"><span></span><span></span><span></span></div>`; }
    const chevron = document.createElement('svg'); chevron.classList.add('think-chevron'); chevron.setAttribute('viewBox','0 0 16 16'); chevron.setAttribute('width','14'); chevron.setAttribute('height','14'); chevron.setAttribute('fill','currentColor'); chevron.innerHTML = '<path d="M8 10.5L3 5.5h10L8 10.5z"/>';
    header.append(spinner, labelEl, chevron);
    const body = document.createElement('div'); body.className = 'think-body';
    const mdDiv = document.createElement('div'); mdDiv.className = 'think-md';
    if (initReasoning) mdDiv.innerHTML = renderMarkdown(initReasoning);
    body.appendChild(mdDiv); block.append(header, body); col.appendChild(block);
    thinkRefs = { block, spinner, labelEl, mdDiv, body };
  }
  const mdEl = document.createElement('div'); mdEl.className = 'md-content';
  if (initContent) mdEl.innerHTML = renderMarkdown(initContent); else mdEl.innerHTML = '<span class="cursor"></span>';
  col.appendChild(mdEl); row.append(avatar, col); document.getElementById('messages').appendChild(row); scrollToBottom(false);
  return { mdEl, thinkRefs };
}
async function sendMessage() {
  if (state.isStreaming) return;
  const ta = document.getElementById('textarea'); const text = ta.value.trim(); if (!text) return;
  if (!state.apiKey) { openSettings(); showToast('请先设置 API Key'); return; }
  ta.value = ''; handleInput();
  const session = state.sessions.find(s => s.id === state.currentSessionId); if (!session) return;
  const messagesToSend =[]; if (state.systemPrompt) messagesToSend.push({ role: 'system', content: state.systemPrompt });
  let recentHistory = session.history; if (state.enableSliding && state.maxContextSize > 0) recentHistory = session.history.slice(-state.maxContextSize);
  recentHistory.forEach(m => messagesToSend.push({ role: m.role, content: m.content })); messagesToSend.push({ role: 'user', content: text });
  buildUserRow(text); session.history.push({ role: 'user', content: text }); session.updatedAt = Date.now(); updateSessionTitleIfNew(text); saveSessionsLocally();
  const refs = buildAssistantRow(); setUI(true); await stream(refs, messagesToSend, session); setUI(false);
}
function setUI(streaming) {
  state.isStreaming = streaming; const btn = document.getElementById('send-btn'); btn.disabled = streaming;
  btn.classList.toggle('empty', streaming || document.getElementById('textarea').value.trim() === '');
  document.getElementById('stop-btn').classList.toggle('visible', streaming);
}
function stopStream() { state.abortController?.abort(); }
async function stream({ mdEl, thinkRefs }, messagesToSend, session) {
  state.abortController = new AbortController(); let thinking = '', answer = '', thinkDone = false; const t0 = Date.now();
  let renderTimer = null, lastRenderTime = 0;
  const updateDOM = () => {
    if (thinking && thinkRefs) { thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking); if (thinkRefs.block.classList.contains('open') && !isUserScrolledUp) thinkRefs.body.scrollTop = thinkRefs.body.scrollHeight; }
    if (answer) mdEl.innerHTML = renderMarkdown(answer) + '<span class="cursor"></span>'; scrollToBottom(false);
  };
  const scheduleRender = () => {
    const now = Date.now();
    if (now - lastRenderTime > 80) { updateDOM(); lastRenderTime = now; } 
    else if (!renderTimer) { renderTimer = setTimeout(() => { updateDOM(); lastRenderTime = Date.now(); renderTimer = null; }, 80); }
  };
  try {
    const res = await fetch(`${state.baseUrl}/chat/completions`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.apiKey}` }, body: JSON.stringify({ model: state.model, messages: messagesToSend, stream: true, max_tokens: 8192 }), signal: state.abortController.signal, });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
    const reader = res.body.getReader(); const decoder = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop(); 
      for (const line of lines) {
        const t = line.trim(); if (!t || t === 'data: [DONE]') continue;
        if (!t.startsWith('data: ')) continue;
        let json; try { json = JSON.parse(t.slice(6)); } catch { continue; }
        const delta = json.choices?.[0]?.delta; if (!delta) continue;
        if (delta.reasoning_content && thinkRefs) { thinking += delta.reasoning_content; scheduleRender(); }
        if (delta.content) {
          if (!thinkDone && thinkRefs) {
            thinkDone = true; const secs = Math.round((Date.now() - t0) / 1000);
            thinkRefs.spinner.className = 'think-done-icon'; thinkRefs.spinner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            thinkRefs.labelEl.innerHTML = `已思考 ${secs} 秒`; thinkRefs.block.classList.remove('open'); thinkRefs.mdDiv.innerHTML = renderMarkdown(thinking);
          }
          answer += delta.content; scheduleRender();
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') { mdEl.innerHTML = `<span style="color:#d93025;font-size:14px">⚠ 错误：${esc(err.message)}</span>`; showToast('请求失败，请检查网络和 API Key'); session.history.pop(); saveSessionsLocally(); }
  } finally {
    if (renderTimer) clearTimeout(renderTimer); updateDOM(); mdEl.querySelector('.cursor')?.remove();
    if (thinkRefs && !thinkDone && state.abortController?.signal.aborted) { thinkRefs.spinner.className = 'think-done-icon'; thinkRefs.spinner.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`; thinkRefs.labelEl.innerHTML = '思考已中止'; }
    if (answer || thinking) { session.history.push({ role: 'assistant', content: answer, reasoning: thinking }); session.updatedAt = Date.now(); saveSessionsLocally(); renderSessionList(); }
    state.abortController = null; scrollToBottom(true);
  }
}
let _toastTmr;
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(_toastTmr); _toastTmr = setTimeout(() => el.classList.remove('show'), 2600); }
document.getElementById('textarea').focus();
